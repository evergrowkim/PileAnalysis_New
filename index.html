// ===== Calc-tip fixed positioning =====
document.addEventListener('mouseenter', function(e) {
  if (!e.target || !e.target.closest) return;
  const tip = e.target.closest('.calc-tip');
  if (!tip) return;
  const content = tip.querySelector('.tip-content');
  if (!content) return;
  const rect = tip.getBoundingClientRect();
  // Try above first
  content.style.left = Math.max(8, Math.min(rect.left + rect.width / 2 - 125, window.innerWidth - 260)) + 'px';
  if (rect.top > 120) {
    content.style.top = '';
    content.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
  } else {
    content.style.bottom = '';
    content.style.top = (rect.bottom + 6) + 'px';
  }
}, true);

// ===== LOCAL STORAGE =====
const LS_KEY = 'pileCalc_state_v2';
const LS_DEFAULTS_KEY = 'pileCalc_userDefaults';
function getUserDefaults() {
  try { const raw = localStorage.getItem(LS_DEFAULTS_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return { coeff_tip: 250, coeff_sand: 2, coeff_clay: 6.25 };
}
function saveUserDefaults() {
  const defaults = { coeff_tip: STATE.coeff_tip, coeff_sand: STATE.coeff_sand, coeff_clay: STATE.coeff_clay };
  localStorage.setItem(LS_DEFAULTS_KEY, JSON.stringify(defaults));
  showToast('현재 계수가 사용자 기준값으로 저장되었습니다', 'success');
  recalculate();
}
function restoreUserDefaults() {
  const raw = localStorage.getItem(LS_DEFAULTS_KEY);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      if (d.coeff_tip != null) STATE.coeff_tip = d.coeff_tip;
      if (d.coeff_sand != null) STATE.coeff_sand = d.coeff_sand;
      if (d.coeff_clay != null) STATE.coeff_clay = d.coeff_clay;
      showToast('사용자 기준값이 복원되었습니다', 'success');
    } catch(e) { showToast('기준값 복원 오류', 'error'); }
  } else {
    STATE.coeff_tip = 250; STATE.coeff_sand = 2; STATE.coeff_clay = 6.25;
    showToast('KDS 기본값이 복원되었습니다 (저장된 사용자 기준값 없음)', 'info');
  }
  recalculate();
}
let _saveTimer = null;
function saveStateToLS() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      const snap = {};
      const keys = ['pileType','diameter_mm','thickness_mm','phcGrade','pileTopEL','groundEL','bearingEL',
        'embedDepth','gwlDepth','boreholeNo','alpha_kh','delta_cm','sigmaMax','useFill','plannedEL','fillN',
        'coeff_tip','coeff_sand','coeff_clay','bearingMethod','corrosionThk','qu_kPa','Sd_m','td_m','rockPhi',
        'jointCount','jointType','nPilesPerBH','sptData','layers','currentBhIdx'];
      keys.forEach(k => { if (STATE[k] !== undefined) snap[k] = STATE[k]; });
      if (STATE.uploadedData) snap.uploadedData = STATE.uploadedData;
      localStorage.setItem(LS_KEY, JSON.stringify(snap));
    } catch(e) {}
  }, 500);
}
function restoreStateFromLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    // 하위호환: 이전 'rock' 값 마이그레이션
    if (snap.bearingMethod === 'rock') snap.bearingMethod = 'rock_wr';
    if (snap.uploadedData) snap.uploadedData.forEach(function(bh) {
      if (bh.designParams && bh.designParams.bearingMethod === 'rock') bh.designParams.bearingMethod = 'rock_wr';
    });
    Object.keys(snap).forEach(k => { STATE[k] = snap[k]; });
    return true;
  } catch(e) { return false; }
}
function clearSavedState() {
  localStorage.removeItem(LS_KEY);
  showToast('저장된 상태가 초기화되었습니다', 'success');
  location.reload();
}

// ===== B3: Sidebar Borehole Search/Filter =====
function filterSidebar(query) {
  if (!STATE.uploadedData) return;
  const list = document.getElementById('sidebarList');
  const countEl = document.getElementById('bhSearchCount');
  const q = (query || '').trim().toLowerCase();
  const items = list.querySelectorAll('.bh-item');
  let shown = 0;
  items.forEach((item, i) => {
    const bh = STATE.uploadedData[i];
    if (!bh) return;
    const match = !q || bh.holeNo.toLowerCase().includes(q);
    item.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  if (countEl) countEl.textContent = q ? `${shown} / ${STATE.uploadedData.length}` : '';
}
// Show search box when boreholes loaded

// ===== B1: Keyboard Shortcuts =====
const TAB_KEYS = ['tab-dashboard','tab-input','tab-vertical','tab-horizontal','tab-pullout','tab-settlement','tab-summary','tab-report','tab-overall','tab-sensitivity'];
function showShortcutHelp() {
  if (document.querySelector('.shortcut-overlay')) return;
  const ov = document.createElement('div');
  ov.className = 'shortcut-overlay';
  ov.onclick = function(e) { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `<div class="shortcut-modal">
    <button class="close-btn" onclick="this.closest('.shortcut-overlay').remove()">&times;</button>
    <h3>키보드 단축키</h3>
    <table>
      <tr><td><kbd>Ctrl</kbd>+<kbd>1</kbd>~<kbd>0</kbd></td><td>탭 전환 (대시보드~민감도)</td></tr>
      <tr><td><kbd>Ctrl</kbd>+<kbd>E</kbd></td><td>엑셀 내보내기</td></tr>
      <tr><td><kbd>Ctrl</kbd>+<kbd>/</kbd></td><td>AI 채팅 열기</td></tr>
      <tr><td><kbd>?</kbd></td><td>단축키 도움말 (이 창)</td></tr>
      <tr><td><kbd>Esc</kbd></td><td>모달/패널 닫기</td></tr>
    </table>
  </div>`;
  document.body.appendChild(ov);
}
document.addEventListener('keydown', function(e) {
  // Ignore if typing in input/textarea/select
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  // ? key → shortcut help
  if (e.key === '?' && !e.ctrlKey && !e.metaKey) { showShortcutHelp(); return; }
  // Ctrl+1~0 → tab switch
  if ((e.ctrlKey || e.metaKey) && ((e.key >= '1' && e.key <= '9') || e.key === '0')) {
    e.preventDefault();
    const idx = e.key === '0' ? 9 : parseInt(e.key) - 1;
    if (idx < TAB_KEYS.length) {
      const tabId = TAB_KEYS[idx];
      const tabEl = document.getElementById(tabId);
      const tabBtn = document.querySelector(`.tab-btn[data-tab="${tabId.replace('tab-','')}"]`);
      // Skip if tab button is hidden (e.g. dashboard before JSON load)
      if (tabBtn && tabBtn.offsetParent === null) return;
      if (tabEl) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tabEl.classList.add('active');
        if (tabBtn) tabBtn.classList.add('active');
      }
    }
    return;
  }
  // Ctrl+E → Excel export
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
    e.preventDefault();
    if (typeof exportExcel === 'function') exportExcel();
    return;
  }
  // Ctrl+/ → AI Chat
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    e.preventDefault();
    if (typeof openChatPanel === 'function') openChatPanel();
    return;
  }
});

// ===== B4: Calculation Progress Bar =====
function showProgress(pct) {
  const bar = document.getElementById('calcProgress');
  if (!bar) return;
  if (pct < 0) { bar.style.width = '0%'; bar.style.opacity = '0'; return; }
  bar.style.opacity = '1';
  bar.style.width = Math.min(pct, 100) + '%';
  if (pct >= 100) { setTimeout(() => { bar.style.width = '0%'; bar.style.opacity = '0'; }, 600); }
}

// ============================================================
// iframe postMessage 통합 (GeoAI Platform)
// ============================================================

// iframe 로드 완료 시 부모 창에 READY 전송
document.addEventListener('DOMContentLoaded', function() {
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'PILE_NEW_READY' }, '*');
    }
});

// 부모 창에서 보낸 메시지 수신
window.addEventListener('message', function(event) {
    if (!event.data || typeof event.data !== 'object') return;

    // 플랫폼 설정 수신 (API 키 등)
    if (event.data.type === 'SET_PLATFORM_CONFIG') {
        var config = event.data.config;
        if (config && config.anthropic_api_key) {
            setAIApiKey(config.anthropic_api_key);
        }
        return;
    }

    // ── 플랫폼에서 앱 상태 요청 (자동저장/수동저장) ──
    if (event.data.type === 'REQUEST_APP_STATE') {
        var trigger = event.data.trigger || 'manual';
        try {
            var saveState = {
                pileType: STATE.pileType, diameter_mm: STATE.diameter_mm,
                thickness_mm: STATE.thickness_mm, phcGrade: STATE.phcGrade,
                pileTopEL: STATE.pileTopEL, groundEL: STATE.groundEL,
                bearingEL: STATE.bearingEL, embedDepth: STATE.embedDepth,
                gwlDepth: STATE.gwlDepth, boreholeNo: STATE.boreholeNo,
                currentBhIdx: STATE.currentBhIdx,
                alpha_kh: STATE.alpha_kh, delta_cm: STATE.delta_cm,
                sigmaMax: STATE.sigmaMax, useFill: STATE.useFill,
                plannedEL: STATE.plannedEL, fillN: STATE.fillN,
                bearingMethod: STATE.bearingMethod, corrosionThk: STATE.corrosionThk,
                qu_kPa: STATE.qu_kPa, Sd_m: STATE.Sd_m, td_m: STATE.td_m,
                rockPhi: STATE.rockPhi, jointCount: STATE.jointCount,
                jointType: STATE.jointType,
                coeff_tip: STATE.coeff_tip, coeff_sand: STATE.coeff_sand,
                coeff_clay: STATE.coeff_clay,
                sptData: JSON.parse(JSON.stringify(STATE.sptData)),
                layers: JSON.parse(JSON.stringify(STATE.layers)),
                uploadedData: STATE.uploadedData ? JSON.parse(JSON.stringify(STATE.uploadedData)) : null,
                result: STATE.result
            };
            window.parent.postMessage({ type: 'SAVE_APP_STATE', state: saveState, trigger: trigger }, '*');
        } catch (e) {
            console.error('상태 직렬화 오류:', e);
        }
        return;
    }

    // ── 플랫폼에서 저장된 상태 복원 ──
    if (event.data.type === 'RESTORE_APP_STATE') {
        var saved = event.data.state;
        if (!saved) return;
        // 하위호환: 이전 'rock' 값 마이그레이션
        if (saved.bearingMethod === 'rock') saved.bearingMethod = 'rock_wr';
        if (saved.uploadedData) saved.uploadedData.forEach(function(bh) {
          if (bh.designParams && bh.designParams.bearingMethod === 'rock') bh.designParams.bearingMethod = 'rock_wr';
        });
        _restoring = true; // 복원 중 saveCurrentToUploadedData 방지
        try {
            // 1. uploadedData 복원 (시추공 데이터 포함)
            if (saved.uploadedData && saved.uploadedData.length > 0) {
                STATE.uploadedData = saved.uploadedData;
            }
            // 2. 설계 파라미터 복원 (먼저 모든 STATE 값 설정)
            var paramKeys = [
                'pileType', 'diameter_mm', 'thickness_mm', 'phcGrade',
                'pileTopEL', 'groundEL', 'bearingEL', 'embedDepth', 'gwlDepth',
                'alpha_kh', 'delta_cm', 'sigmaMax', 'useFill', 'plannedEL', 'fillN',
                'bearingMethod', 'corrosionThk', 'qu_kPa', 'Sd_m', 'td_m',
                'rockPhi', 'jointCount', 'jointType',
                'coeff_tip', 'coeff_sand', 'coeff_clay'
            ];
            paramKeys.forEach(function(key) {
                if (saved[key] !== undefined) STATE[key] = saved[key];
            });
            if (saved.currentBhIdx != null) STATE.currentBhIdx = saved.currentBhIdx;
            if (saved.boreholeNo) STATE.boreholeNo = saved.boreholeNo;
            // 3. SPT/지층 데이터 복원 (저장된 것이 최종 수정본)
            if (saved.sptData) STATE.sptData = JSON.parse(JSON.stringify(saved.sptData));
            if (saved.layers) STATE.layers = JSON.parse(JSON.stringify(saved.layers));
            // 4. 재계산 + UI 갱신
            _restoring = false;
            recalculate();
        } catch (e) {
            _restoring = false;
            console.error('상태 복원 오류:', e);
        }
        return;
    }

    if (event.data.type === 'LOAD_BOREHOLE_DATA') {
        var jsonData = event.data.data;
        if (!jsonData) return;

        try {
            // extracted_data 배열을 감싼 객체 생성 → importDrillLogJSON 호환
            var payload = jsonData.extracted_data || jsonData;
            var jsonObj = Array.isArray(payload) ? { extracted_data: payload } : payload;
            var boreholes = importDrillLogJSON(jsonObj);
            if (boreholes.length === 0) return;

            STATE.uploadedData = boreholes;
            applyBoreholeData(boreholes[0], 0);

            // 부모 창에 데이터 로드 완료 알림
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'PILE_NEW_DATA_LOADED',
                    count: boreholes.length,
                }, '*');
            }
        } catch (error) {
            console.error('postMessage 데이터 처리 오류:', error);
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'PILE_NEW_ERROR',
                    message: error.message,
                }, '*');
            }
        }
    }
});
