// ===== SMART SPT PARSER =====

/** 1단계: 행을 열로 분리 (탭 우선, 없으면 공백 기반 스마트 분리) */
function splitRowCols(line) {
  // 탭이 있으면 탭 구분
  if (line.indexOf('\t') >= 0) return line.split('\t').map(c => c.trim());
  // 탭 없으면 공백 분리 후 한글 토큰 병합
  const tokens = line.split(/\s+/).filter(c => c.length > 0);
  // 한글+문자가 이전 토큰에 이어지는 경우 병합 (예: "풍화암 ç" → "풍화암ç", "퇴적층 (SM)" → "퇴적층(SM)")
  const merged = [];
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    const prev = merged.length > 0 ? merged[merged.length - 1] : '';
    const prevIsKorean = /[가-힣]/.test(prev);
    const curIsKorean = /[가-힣]/.test(t);
    const curIsParenOrCode = /^[\(\[]/.test(t) || /^[A-Z]{1,3}[\)\]]?$/.test(t);
    // 병합 조건: 이전이 한글이고 현재도 한글/괄호/코드
    if (prevIsKorean && (curIsKorean || curIsParenOrCode)) {
      merged[merged.length - 1] = prev + t;
    } else {
      merged.push(t);
    }
  }
  return merged;
}

/** 2단계: 헤더/단위/빈 행 판별 */
function classifyRow(cols) {
  const joined = cols.join(' ').toLowerCase();
  // 헤더 키워드
  const headerKW = ['no.','el.','el+','depth','깊이','n값','n value','remark','비고','blow','spt,','표고','심도','지층','토질'];
  if (headerKW.some(kw => joined.includes(kw))) return 'header';
  // 단위 행
  const unitKW = ['blow/30cm','blow/30','m/m','kn/m','kg/m','t/m'];
  const unitOnly = cols.filter(c => c.length > 0);
  if (unitOnly.length > 0 && unitOnly.every(c => /^[m\/\s\-\(\)]+$/.test(c) || unitKW.some(u => c.toLowerCase().includes(u)))) return 'unit';
  // 유효 숫자가 2개 미만인 행은 빈 행 처리 (No.만 있는 행 등)
  const validNums = cols.filter(c => /\d/.test(c) && !isNaN(parseFloat(c.replace(/[,]/g,''))));
  if (validNums.length < 2) return 'empty';
  return 'data';
}

/** 3단계: 컬럼 역할 자동 추론 (헤더 행 활용) */
function detectColumnRoles(dataRows, headerRows) {
  if (dataRows.length === 0) return null;
  headerRows = headerRows || [];
  const maxCols = Math.max(...dataRows.map(r => r.length));
  const colStats = [];
  for (let c = 0; c < maxCols; c++) {
    const vals = dataRows.map(r => r[c] || '').filter(v => v.length > 0);
    const nums = vals.map(v => parseFloat(v.replace(/[,]/g,''))).filter(v => !isNaN(v));
    const hasKorean = vals.some(v => /[가-힣]/.test(v));
    const allInt = nums.length > 0 && nums.every(v => Number.isInteger(v));
    const isSequential = nums.length >= 2 && nums.every((v,i) => i === 0 || v >= nums[i-1]);
    const isStrictSeq = nums.length >= 2 && nums.every((v,i) => i === 0 || v === nums[i-1] + 1);
    const avg = nums.length > 0 ? nums.reduce((a,b)=>a+b,0)/nums.length : 0;
    const min = nums.length > 0 ? Math.min(...nums) : 0;
    const max = nums.length > 0 ? Math.max(...nums) : 0;
    // 값들의 변동성 (표준편차/평균)
    const variance = nums.length > 1 ? Math.sqrt(nums.reduce((s,v) => s + (v-avg)*(v-avg), 0) / nums.length) : 0;
    const cv = avg > 0 ? variance / avg : 0; // 변동계수
    colStats.push({ idx: c, nums, hasKorean, allInt, isSequential, isStrictSeq, avg, min, max, total: vals.length, numCount: nums.length, nonNumCount: vals.length - nums.length, cv });
  }

  const roles = new Array(maxCols).fill(null);
  const assigned = new Set();
  const numericCols = colStats.filter(s => s.numCount >= 2);

  // 0) 헤더 키워드 기반 사전 감지 (우선 순위 높음)
  // 데이터 열 수와 가장 일치하는 헤더 행만 사용 (열 수가 다른 헤더는 인덱스 불일치)
  const headerHints = new Array(maxCols).fill('');
  const sortedHeaders = [...headerRows].sort((a,b) => b.length - a.length);
  // 가장 긴 헤더(데이터 열 수와 가까운)를 우선 사용; 열 수가 90% 이상 일치하는 것만
  const bestHeader = sortedHeaders.find(r => r.length >= maxCols * 0.9);
  if (bestHeader) {
    bestHeader.forEach((cell, i) => { if (i < maxCols) headerHints[i] = (cell || '').toLowerCase(); });
  } else if (sortedHeaders.length > 0 && sortedHeaders[0].length === maxCols) {
    sortedHeaders[0].forEach((cell, i) => { if (i < maxCols) headerHints[i] = (cell || '').toLowerCase(); });
  }
  // N값 헤더 키워드: 최종 N값을 나타내는 열 (비고(n1+n2), N값, 합계(n1+n2) 등)
  // "타격수", "1차", "2차", "3차" 등 개별 blow count는 제외
  let headerNIdx = -1;
  const nValueKW = ['n값', 'n1+n2', 'n1 + n2', 'n value', 'spt-n', 'spt n'];
  const sumKW = ['합계'];
  const blowKW = ['타격수', '1차', '2차', '3차', 'blow'];
  for (let c = 0; c < maxCols; c++) {
    const h = headerHints[c];
    // 직접 N값 키워드 매칭
    if (nValueKW.some(kw => h.includes(kw))) { headerNIdx = c; break; }
  }
  // N값 직접 키워드 없으면, "합계" 열 중 "타격수" 블록이 아닌 것 찾기
  if (headerNIdx < 0) {
    for (let c = 0; c < maxCols; c++) {
      const h = headerHints[c];
      if (sumKW.some(kw => h.includes(kw)) && !blowKW.some(kw => h.includes(kw))) {
        // "합계" 열이 타격수 합계가 아닌 최종 N값 합계인지 확인
        // 주변 열에 "타격수" 키워드가 있으면 이건 blow count 합계이므로 스킵
        const nearby = [c-1, c+1].filter(i => i >= 0 && i < maxCols);
        const nearbyIsBlow = nearby.some(i => blowKW.some(kw => headerHints[i].includes(kw)));
        if (!nearbyIsBlow) { headerNIdx = c; break; }
      }
    }
  }

  // 1) Remark: 한글 포함 열 (비숫자 비율 높은)
  const remarkCand = colStats.filter(s => s.hasKorean && s.nonNumCount >= 1);
  if (remarkCand.length > 0) {
    const best = remarkCand.reduce((a,b) => a.nonNumCount > b.nonNumCount ? a : b);
    roles[best.idx] = 'remark'; assigned.add(best.idx);
  }

  // 2) No.: 1,2,3... 정확한 순차 정수열, 첫 번째 값 = 1, 첫 번째 열 우선
  const noCand = numericCols.filter(s => !assigned.has(s.idx) && s.isStrictSeq && s.allInt && s.min === 1);
  if (noCand.length > 0) {
    // 첫 번째 열(idx=0)이 후보에 있으면 그것만 No.로 인정
    const firstCol = noCand.find(s => s.idx === 0);
    if (firstCol) { roles[firstCol.idx] = 'no'; assigned.add(firstCol.idx); }
    // 첫 번째 열이 아니면 No. 지정 안 함 (Depth일 수 있음)
  }

  // 3) EL: 값이 큼 (50~300), 감소 경향, 변동계수 작음
  const elCand = numericCols.filter(s => !assigned.has(s.idx) && s.avg > 50 && s.avg < 300 && s.min > 10);
  if (elCand.length > 0) {
    const decr = elCand.filter(s => s.nums.length >= 2 && s.nums[0] > s.nums[s.nums.length-1]);
    const pool = decr.length > 0 ? decr : elCand;
    const best = pool.reduce((a,b) => Math.abs(a.avg - 130) < Math.abs(b.avg - 130) ? a : b);
    roles[best.idx] = 'el'; assigned.add(best.idx);
  }

  // 4) Depth: 순차 증가, 0~100 범위, 등간격 경향
  const depthCand = numericCols.filter(s => !assigned.has(s.idx) && s.isSequential && s.min >= 0 && s.max <= 100 && s.avg < 60);
  if (depthCand.length > 0) {
    // 등간격성 점수: 인접 차이의 분산이 작을수록 Depth일 가능성 높음
    const best = depthCand.reduce((a,b) => {
      const aDiffs = a.nums.slice(1).map((v,i) => v - a.nums[i]);
      const bDiffs = b.nums.slice(1).map((v,i) => v - b.nums[i]);
      const aVar = aDiffs.length > 0 ? Math.sqrt(aDiffs.reduce((s,v) => { const m = aDiffs.reduce((a2,b2)=>a2+b2,0)/aDiffs.length; return s+(v-m)*(v-m); },0)/aDiffs.length) : 999;
      const bVar = bDiffs.length > 0 ? Math.sqrt(bDiffs.reduce((s,v) => { const m = bDiffs.reduce((a2,b2)=>a2+b2,0)/bDiffs.length; return s+(v-m)*(v-m); },0)/bDiffs.length) : 999;
      // 점수: 등간격(분산 작음) + 첫값 작음 + 변동계수 작음
      const aScore = -aVar * 10 - a.min - a.cv * 5;
      const bScore = -bVar * 10 - b.min - b.cv * 5;
      return aScore >= bScore ? a : b;
    });
    roles[best.idx] = 'depth'; assigned.add(best.idx);
  }

  // 5) N값: 헤더 힌트 우선, 없으면 통계 기반
  if (headerNIdx >= 0 && !assigned.has(headerNIdx)) {
    // 헤더 키워드로 N값 열이 확정된 경우
    const stat = colStats.find(s => s.idx === headerNIdx);
    if (stat && stat.numCount >= 2) {
      roles[headerNIdx] = 'n'; assigned.add(headerNIdx);
    }
  }
  if (!roles.includes('n')) {
    const nCand = numericCols.filter(s => !assigned.has(s.idx) && s.min >= 0 && s.max <= 100);
    if (nCand.length > 0) {
      const best = nCand.reduce((a,b) => {
        // N값 특성: 정수, 비순차적(변동계수 큼), 0~60 범위, 값의 범위가 넓음
        const aRange = a.max - a.min;
        const bRange = b.max - b.min;
        const aScore = (a.allInt ? 10 : 0) + (a.avg <= 50 ? 5 : 0) + (a.cv > 0.3 ? 3 : 0) + (!a.isStrictSeq ? 2 : 0)
          + (aRange > 5 ? 5 : 0) + (a.avg >= 5 ? 3 : 0) + (aRange <= 2 ? -15 : 0);
        const bScore = (b.allInt ? 10 : 0) + (b.avg <= 50 ? 5 : 0) + (b.cv > 0.3 ? 3 : 0) + (!b.isStrictSeq ? 2 : 0)
          + (bRange > 5 ? 5 : 0) + (b.avg >= 5 ? 3 : 0) + (bRange <= 2 ? -15 : 0);
        return aScore >= bScore ? a : b;
      });
      roles[best.idx] = 'n'; assigned.add(best.idx);
    }
  }

  // 2열만 있고 depth/n만 필요한 간단한 케이스
  if (maxCols === 2 && !roles.includes('n')) {
    const unassigned = colStats.filter(s => !assigned.has(s.idx) && s.numCount >= 2);
    if (unassigned.length > 0) { roles[unassigned[0].idx] = 'n'; assigned.add(unassigned[0].idx); }
  }

  // depth 없으면 el에서 역산하므로 OK. 둘 다 없으면 fallback
  if (!roles.includes('depth') && !roles.includes('el')) {
    const fallback = numericCols.filter(s => !assigned.has(s.idx) && s.isSequential);
    if (fallback.length > 0) { roles[fallback[0].idx] = 'depth'; assigned.add(fallback[0].idx); }
  }

  // n이 여전히 없으면 남은 숫자열 중 하나
  if (!roles.includes('n')) {
    const fallback = numericCols.filter(s => !assigned.has(s.idx));
    if (fallback.length > 0) { roles[fallback[0].idx] = 'n'; assigned.add(fallback[0].idx); }
  }

  return { roles, maxCols, colStats };
}

/** 4단계: 데이터 행에서 SPT 레코드 추출 */
function extractSPTRecords(dataRows, detection) {
  const { roles } = detection;
  const depthIdx = roles.indexOf('depth');
  const elIdx = roles.indexOf('el');
  const nIdx = roles.indexOf('n');
  const remarkIdx = roles.indexOf('remark');

  // EL로부터 depth 역산 시 기준 표고 결정
  // EL 열의 최대값을 groundEL 기준으로 사용 (첫 번째 데이터가 최상부)
  let elBase = STATE.groundEL;
  if (elIdx >= 0 && depthIdx < 0) {
    const firstEL = dataRows.find(r => r[elIdx] && !isNaN(parseFloat(r[elIdx])));
    if (firstEL) {
      const depthCol = dataRows.map(r => r[elIdx] ? parseFloat(r[elIdx]) : NaN).filter(v => !isNaN(v));
      if (depthCol.length > 0) elBase = Math.max(...depthCol) + 1; // 최고 표고 + 1m = 지반고 추정
    }
  }

  const records = [];
  dataRows.forEach((cols, rowIdx) => {
    const rawN = nIdx >= 0 && cols[nIdx] ? parseFloat(cols[nIdx].replace(/[,]/g,'')) : NaN;
    if (isNaN(rawN)) return; // N값 없으면 스킵

    let depth = NaN, el = NaN;
    if (depthIdx >= 0 && cols[depthIdx]) depth = parseFloat(cols[depthIdx].replace(/[,]/g,''));
    if (elIdx >= 0 && cols[elIdx]) el = parseFloat(cols[elIdx].replace(/[,]/g,''));

    // depth 없으면 el로부터 역산
    if (isNaN(depth) && !isNaN(el)) {
      depth = elBase - el;
    }
    // 둘 다 없으면 행 번호로 추정 (1m 간격)
    if (isNaN(depth)) depth = rowIdx + 1;
    // depth가 음수이면 보정
    if (depth < 0) depth = Math.abs(depth);

    let remark = remarkIdx >= 0 && cols[remarkIdx] ? cols[remarkIdx].trim() : '';
    // 비정상 문자 제거 후 매핑
    remark = remark.replace(/[^\uAC00-\uD7AF\u3131-\u3163a-zA-Z0-9\(\)\s\-\/]/g, '').trim();
    const mapped = mapSoilName(remark);

    records.push({
      depth: Math.round(depth * 100) / 100,
      N: Math.min(Math.max(Math.round(rawN), 0), 60),
      el: !isNaN(el) ? Math.round(el * 100) / 100 : null,
      remark: mapped || '퇴적층(SM)'
    });
  });

  // depth 기준 정렬
  records.sort((a,b) => a.depth - b.depth);
  return records;
}

/** 전처리: 텍스트 정규화 + 줄바꿈 없는 한 줄 데이터 복원 */
function preprocessPasteText(text) {
  let t = text
    .replace(/\uFF0C/g, ',')       // 전각 쉼표
    .replace(/\uFF0E/g, '.')       // 전각 마침표
    .replace(/[ç©★●◆■□△▲▽▼※\u200B\uFEFF]/g, '') // 비정상/특수문자/ZWS 제거
    .trim();
  // 줄바꿈이 거의 없는 한 줄 데이터인 경우: 행 분리 복원
  const lineCount = (t.match(/\n/g) || []).length;
  const numCount = (t.match(/\d+\.?\d*/g) || []).length;
  if (lineCount < 3 && numCount > 10) {
    // 단위행 키워드 뒤 숫자 → 줄바꿈 (예: 'blow/30cm 1' → 'blow/30cm\n1')
    t = t.replace(/(blow\/30cm|m\/m|kn\/m)\s+(\d)/gi, '$1\n$2');
    // 전각공백(　) 뒤 숫자 → 줄바꿈 (빈 셀 다음 새 행)
    t = t.replace(/\u3000\s*(\d)/g, '\n$1');
    // 한글/괄호 뒤 공백+숫자 → 줄바꿈 (예: '성토층 2' → '성토층\n2')
    t = t.replace(/([가-힣\)]) +(\d)/g, '$1\n$2');
  }
  // 전각 공백 → 반각 (줄바꿈 복원 후 처리)
  t = t.replace(/\u3000/g, ' ');
  return t;
}

/** 메인 파싱 함수: 텍스트 → SPT 레코드 배열 */
function smartParseSPT(text) {
  const cleaned = preprocessPasteText(text);
  if (!cleaned) return { records: [], info: '', headerSkipped: 0, emptySkipped: 0 };

  const rawLines = cleaned.split('\n');
  let headerSkipped = 0, unitSkipped = 0, emptySkipped = 0;
  const dataRows = [];

  const headerRows = [];
  rawLines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) { emptySkipped++; return; }
    const cols = splitRowCols(trimmed);
    const cls = classifyRow(cols);
    if (cls === 'header') { headerSkipped++; headerRows.push(cols); return; }
    if (cls === 'unit') { unitSkipped++; return; }
    if (cls === 'empty') { emptySkipped++; return; }
    dataRows.push(cols);
  });

  if (dataRows.length === 0) return { records: [], info: '유효 데이터 없음', headerSkipped, emptySkipped };

  const detection = detectColumnRoles(dataRows, headerRows);
  if (!detection) return { records: [], info: '컬럼 감지 실패', headerSkipped, emptySkipped };

  const records = extractSPTRecords(dataRows, detection);

  // 감지 정보 문자열
  const roleNames = { no: 'No.', el: 'EL', depth: 'Depth', n: 'N값', remark: '비고' };
  const detectedStr = detection.roles.map((r,i) => r ? (i+1) + '열=' + roleNames[r] : null).filter(Boolean).join(', ');
  const info = '컬럼감지: ' + detectedStr + ' | 헤더 ' + headerSkipped + '행, 빈행 ' + emptySkipped + '행 제거';

  return { records, info, headerSkipped, emptySkipped, detection };
}

/** 적용 (미리보기 데이터를 STATE에 반영) */
/** 붙여넣기 적용 시 기존 업로드/다공 데이터를 모두 초기화하고 새 데이터로 완전 대체 */
function clearPreviousData() {
  STATE.uploadedData = null;
  STATE.allResults = new Map();
}

function applyParsedSPT() {
  const records = window._parsedSPTCache;
  if (!records || records.length === 0) { showToast('적용할 데이터가 없습니다', 'warning'); return; }
  clearPreviousData();
  STATE.sptData = records.map(r => ({ depth: r.depth, N: Math.min(r.N, 50), remark: r.remark }));

  // EL 데이터가 있으면 지반고(groundEL) 자동 추정
  // 표시 공식: displayEL = groundEL - depth + 1  ∴ groundEL = EL + depth - 1
  // 첫 번째 유효 레코드 기준 (최상부 데이터가 가장 정확)
  const elRecords = records.filter(r => r.el != null && r.depth > 0);
  if (elRecords.length > 0) {
    const first = elRecords[0];
    const newGroundEL = Math.round((first.el + first.depth - 1) * 100) / 100;
    STATE.groundEL = newGroundEL;
  }

  autoGenerateLayers();
  closePasteModal();
  recalculate();
  const elMsg = elRecords.length > 0 ? ' / 지반고 EL=' + STATE.groundEL + 'm 반영' : '';
  showToast(records.length + '개 SPT 데이터 적용 완료 (기존 데이터 초기화' + elMsg + ')', 'success');
}

// 하위 호환: 기존 parsePastedSPT 호출 시에도 동작
function parsePastedSPT() {
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { showToast('데이터를 입력하세요', 'warning'); return; }
  const result = smartParseSPT(text);
  if (result.records.length === 0) { showToast('유효한 데이터를 찾을 수 없습니다', 'error'); return; }
  clearPreviousData();
  STATE.sptData = result.records.map(r => ({ depth: r.depth, N: Math.min(r.N, 50), remark: r.remark }));

  // EL 데이터가 있으면 지반고(groundEL) 자동 추정
  const elRecords = result.records.filter(r => r.el != null && r.depth > 0);
  if (elRecords.length > 0) {
    const first = elRecords[0];
    STATE.groundEL = Math.round((first.el + first.depth - 1) * 100) / 100;
  }

  autoGenerateLayers();
  closePasteModal();
  recalculate();
  showToast(result.records.length + '개 SPT 데이터 적용 완료 (기존 데이터 초기화)', 'success');
}

function autoGenerateLayers() {
  if (STATE.sptData.length === 0) return;
  const groups = [];
  let cur = null;
  STATE.sptData.forEach(s => {
    const soil = s.remark || '퇴적층(SM)';
    if (!cur || cur.soilType !== soil) {
      if (cur) cur.depthTo = s.depth - 0.5;
      cur = { soilType: soil, depthFrom: cur ? cur.depthTo : 0, depthTo: s.depth + 0.5, ns: [s.N] };
      groups.push(cur);
    } else { cur.ns.push(s.N); cur.depthTo = s.depth + 0.5; }
  });
  STATE.layers = groups.map(g => ({
    soilType: g.soilType,
    depthFrom: parseFloat(g.depthFrom.toFixed(2)),
    depthTo: parseFloat(g.depthTo.toFixed(2)),
    thickness: parseFloat((g.depthTo - g.depthFrom).toFixed(2)),
    avgN: parseFloat((g.ns.reduce((a,b)=>a+b,0)/g.ns.length).toFixed(1)),
    unitWeight: UW_DEF[g.soilType] || 18,
    _sptDetail: g.ns.map((n,i) => (g.depthFrom + i + 0.5).toFixed(0) + 'm(N=' + n + ')').join(', '),
    _sptCount: g.ns.length
  }));
}

      sptData: bh.sptData, layers: bh.layers,

// ── 차트 생성 ──
function generateBarChart(labels, values, opts={}) {
  const {title='',width=720,height=400,barColor='#1e3a5f',yLabel='',refLine=null,refLabel=''}=opts;
  const cv=document.createElement('canvas'); cv.width=width; cv.height=height;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,width,height);
  const m={top:50,right:30,bottom:70,left:65}, cW=width-m.left-m.right, cH=height-m.top-m.bottom;
  const maxV=Math.max(...values,1)*1.15, barW=Math.min(cW/labels.length*0.65,45), gap=cW/labels.length;
  ctx.fillStyle='#1e3a5f'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.fillText(title,width/2,28);
  // Y gridlines
  for(let i=0;i<=5;i++){const y=m.top+cH-cH*i/5; ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(m.left,y); ctx.lineTo(width-m.right,y); ctx.stroke(); ctx.fillStyle='#888'; ctx.font='9px sans-serif'; ctx.textAlign='right'; ctx.fillText((maxV*i/5).toFixed(0),m.left-5,y+3);}
  // Bars
  labels.forEach((lb,i)=>{const bH=(values[i]/maxV)*cH; const x=m.left+i*gap+(gap-barW)/2; const y=m.top+cH-bH;
    const grad=ctx.createLinearGradient(x,y,x,m.top+cH); grad.addColorStop(0,Array.isArray(barColor)?barColor[i%barColor.length]:barColor); grad.addColorStop(1,'#a0b4cc');
    ctx.fillStyle=grad; ctx.fillRect(x,y,barW,bH);
    ctx.fillStyle='#333'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center'; ctx.fillText(values[i]!=null?values[i].toFixed(1):'',x+barW/2,y-5);
    ctx.save(); ctx.translate(x+barW/2,m.top+cH+8); ctx.rotate(-Math.PI/5); ctx.textAlign='right'; ctx.fillStyle='#555'; ctx.font='8px sans-serif'; ctx.fillText(lb,0,0); ctx.restore();
  });
  // Reference line
  if(refLine!=null&&refLine>0){const ry=m.top+cH-(refLine/maxV)*cH; ctx.strokeStyle='#e53e3e'; ctx.lineWidth=2; ctx.setLineDash([6,3]); ctx.beginPath(); ctx.moveTo(m.left,ry); ctx.lineTo(width-m.right,ry); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle='#e53e3e'; ctx.font='bold 9px sans-serif'; ctx.textAlign='left'; ctx.fillText(refLabel+' '+refLine,width-m.right+2,ry+3);}
  if(yLabel){ctx.save(); ctx.translate(14,m.top+cH/2); ctx.rotate(-Math.PI/2); ctx.fillStyle='#888'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText(yLabel,0,0); ctx.restore();}
  return cv.toDataURL('image/png').split(',')[1];
}

  const barW=Math.min(cW/labels.length*0.65,45), gap=cW/labels.length;
  ctx.fillStyle='#1e3a5f'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.fillText(title,width/2,28);
  for(let i=0;i<=5;i++){const y=m.top+cH-cH*i/5; ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(m.left,y); ctx.lineTo(width-m.right,y); ctx.stroke(); ctx.fillStyle='#888'; ctx.font='9px sans-serif'; ctx.textAlign='right'; ctx.fillText((maxV*i/5).toFixed(0),m.left-5,y+3);}
  labels.forEach((lb,i)=>{const x=m.left+i*gap+(gap-barW)/2;
    const sH=(skinV[i]/maxV)*cH, tH=(tipV[i]/maxV)*cH;
    ctx.fillStyle='#e94560'; ctx.fillRect(x,m.top+cH-sH-tH,barW,sH);
    ctx.fillStyle='#2c4e7e'; ctx.fillRect(x,m.top+cH-tH,barW,tH);
    ctx.fillStyle='#333'; ctx.font='bold 8px sans-serif'; ctx.textAlign='center'; ctx.fillText(totals[i].toFixed(0),x+barW/2,m.top+cH-sH-tH-5);
    ctx.save(); ctx.translate(x+barW/2,m.top+cH+8); ctx.rotate(-Math.PI/5); ctx.textAlign='right'; ctx.fillStyle='#555'; ctx.font='8px sans-serif'; ctx.fillText(lb,0,0); ctx.restore();
  });
  // Legend
  const lx=width-m.right-140, ly=m.top+5;
  ctx.fillStyle='#2c4e7e'; ctx.fillRect(lx,ly,12,12); ctx.fillStyle='#333'; ctx.font='10px sans-serif'; ctx.textAlign='left'; ctx.fillText('선단지지력 (Qu_tip)',lx+16,ly+10);
  ctx.fillStyle='#e94560'; ctx.fillRect(lx,ly+18,12,12); ctx.fillText('주면마찰력 (Qu_skin)',lx+16,ly+28);
  return cv.toDataURL('image/png').split(',')[1];
}

// ===== OVERALL RESULTS TAB (merged with Dashboard) =====
// ===== QUANTITY ESTIMATION =====
function calcQuantities() {
  const isPHC = STATE.pileType === 'PHC';
  const pileSpec = isPHC ? 'PHC ' + STATE.diameter_mm + 'mm ' + STATE.phcGrade + '\uC885' : '\uAC15\uAD00 ' + STATE.diameter_mm + 'mm';
  const nPer = STATE.nPilesPerBH || 1;
  const items = [];

  if (STATE.uploadedData && STATE.uploadedData.length > 0) {
    STATE.uploadedData.forEach(bh => {
      const r = BH_RESULTS[bh.holeNo];
      if (!r) return;
      const n = bh.nPiles || nPer;
      items.push({
        holeNo: bh.holeNo, nPiles: n,
        pileLength: r.pileLength,
        weight_ton: (r.W_unit * r.pileLength) / 9.80665 * n,
        volume_m3: r.Ap_net * r.pileLength * n,
        surface_m2: r.U * r.pileLength * n,
        weight_ton_1: (r.W_unit * r.pileLength) / 9.80665,
        W_unit: r.W_unit, Ap_net: r.Ap_net, U: r.U
      });
    });
  } else if (STATE.result) {
    const r = STATE.result;
    items.push({
      holeNo: STATE.boreholeNo, nPiles: nPer,
      pileLength: r.pileLength,
      weight_ton: (r.W_unit * r.pileLength) / 9.80665 * nPer,
      volume_m3: r.Ap_net * r.pileLength * nPer,
      surface_m2: r.U * r.pileLength * nPer,
      weight_ton_1: (r.W_unit * r.pileLength) / 9.80665,
      W_unit: r.W_unit, Ap_net: r.Ap_net, U: r.U
    });
  }

  const totalPiles = items.reduce((s, i) => s + i.nPiles, 0);
  const lengths = items.map(i => i.pileLength);
  return {
    items, pileSpec, nPilesPerBH: nPer,
    totalPiles,
    totalLength: items.reduce((s, i) => s + i.pileLength * i.nPiles, 0),
    totalWeight_ton: items.reduce((s, i) => s + i.weight_ton, 0),
    totalVolume_m3: items.reduce((s, i) => s + i.volume_m3, 0),
    totalSurface_m2: items.reduce((s, i) => s + i.surface_m2, 0),
    avgLength: lengths.length > 0 ? lengths.reduce((s, v) => s + v, 0) / lengths.length : 0,
    minLength: lengths.length > 0 ? Math.min(...lengths) : 0,
    maxLength: lengths.length > 0 ? Math.max(...lengths) : 0
  };
}

function applyBatchGlobal() {
  const bEL = document.getElementById('batchBearingEL')?.value;
  const ed = document.getElementById('batchEmbedDepth')?.value;
  const np = document.getElementById('batchNPiles')?.value;
  document.querySelectorAll('#batchEditorWrap input[data-bh]').forEach(inp => {
    if (inp.dataset.field === 'bearingEL' && bEL) inp.value = bEL;
    if (inp.dataset.field === 'embedDepth' && ed) inp.value = ed;
    if (inp.dataset.field === 'nPiles' && np) inp.value = np;
  });
}
function applyBatchAll() {
  document.querySelectorAll('#batchEditorWrap input[data-bh]').forEach(inp => {
    const idx = parseInt(inp.dataset.bh);
    const bh = STATE.uploadedData[idx];
    if (!bh) return;
    const val = parseFloat(inp.value);
    if (isNaN(val)) return;
    if (inp.dataset.field === 'bearingEL') { bh.bearingEL = val; }
    if (inp.dataset.field === 'embedDepth') {
      if (!bh.designParams) bh.designParams = {};
      bh.designParams.embedDepth = val;
    }
    if (inp.dataset.field === 'nPiles') { bh.nPiles = Math.max(1, Math.round(val)); }
  });
  // 현재 시추공 반영
  const curBh = STATE.uploadedData[STATE.currentBhIdx];
  if (curBh) {
    if (curBh.bearingEL != null) STATE.bearingEL = curBh.bearingEL;
    if (curBh.designParams && curBh.designParams.embedDepth != null) STATE.embedDepth = curBh.designParams.embedDepth;
  }
  calcAllBoreholes();
  renderOverallTab();
  showToast('일괄 편집이 적용되었습니다', 'success');
}

function renderCrossSection() {
  if (!STATE.uploadedData || STATE.uploadedData.length < 2) return '';
  const bhs = STATE.uploadedData;
  const colW = Math.min(120, Math.floor(900 / bhs.length));
  const svgW = 60 + bhs.length * colW + 20;
  const svgH = 400;
  const padTop = 40, padBot = 30;
  const chartH = svgH - padTop - padBot;

  // Find global min/max EL
  let minEL = Infinity, maxEL = -Infinity;
  bhs.forEach(bh => {
    const gEL = bh.groundEL || STATE.groundEL;
    if (gEL > maxEL) maxEL = gEL;
    const layers = bh.layers || [];
    let cumD = 0;
    layers.forEach(l => { cumD += l.thickness; });
    const botEL = gEL - cumD;
    if (botEL < minEL) minEL = botEL;
  });
  if (minEL === Infinity) return '';
  const range = maxEL - minEL || 1;
  const elToY = el => padTop + (maxEL - el) / range * chartH;

  let svg = `<svg width="${svgW}" height="${svgH}" style="background:#fff;border:1px solid #e2e8f0;border-radius:6px">`;
  // Y-axis labels
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const el = maxEL - (range * i / steps);
    const y = elToY(el);
    svg += `<text x="50" y="${y+3}" text-anchor="end" fill="#64748b" font-size="9" font-family="var(--font-mono)">EL.${el.toFixed(0)}</text>`;
    svg += `<line x1="55" y1="${y}" x2="${svgW-10}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>`;
  }

  // Draw each borehole column
  bhs.forEach((bh, bi) => {
    const x = 60 + bi * colW;
    const gEL = bh.groundEL || STATE.groundEL;
    const layers = bh.layers || [];
    const bEL = bh.bearingEL != null ? bh.bearingEL : STATE.bearingEL;
    // Borehole label
    svg += `<text x="${x + colW/2}" y="${padTop - 8}" text-anchor="middle" fill="var(--primary-navy)" font-size="9" font-weight="600">${bh.holeNo}</text>`;
    // Ground surface line
    const gY = elToY(gEL);
    svg += `<line x1="${x+2}" y1="${gY}" x2="${x+colW-2}" y2="${gY}" stroke="#059669" stroke-width="2"/>`;
    // Layer blocks
    let cumD = 0;
    layers.forEach(l => {
      const topEL = gEL - cumD;
      const botEL = topEL - l.thickness;
      cumD += l.thickness;
      const y1 = elToY(topEL);
      const y2 = elToY(botEL);
      const h = Math.max(y2 - y1, 1);
      const color = getSoilColor(l.soilType);
      svg += `<rect x="${x+4}" y="${y1}" width="${colW-8}" height="${h}" fill="${color}" stroke="#fff" stroke-width="0.5" opacity="0.85" style="cursor:pointer"><title>${bh.holeNo}\n지층: ${l.soilType}\n두께: ${l.thickness.toFixed(1)}m\nEL.${topEL.toFixed(1)} ~ EL.${botEL.toFixed(1)}\n평균N: ${l.avgN || '-'}</title></rect>`;
      if (h > 12) {
        svg += `<text x="${x + colW/2}" y="${y1 + h/2 + 3}" text-anchor="middle" fill="#333" font-size="7" font-weight="500">${l.soilType.replace(/\(.+\)/,'')}</text>`;
      }
    });
    // Bearing EL line
    if (bEL != null) {
      const bY = elToY(bEL);
      svg += `<line x1="${x+2}" y1="${bY}" x2="${x+colW-2}" y2="${bY}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>`;
    }
  });

  // Connect ground surface between boreholes
  for (let i = 0; i < bhs.length - 1; i++) {
    const x1 = 60 + i * colW + colW/2;
    const x2 = 60 + (i+1) * colW + colW/2;
    const y1 = elToY(bhs[i].groundEL || STATE.groundEL);
    const y2 = elToY(bhs[i+1].groundEL || STATE.groundEL);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>`;
  }

  // Legend
  svg += `<line x1="${svgW-180}" y1="${svgH-12}" x2="${svgW-160}" y2="${svgH-12}" stroke="#059669" stroke-width="2"/>`;
  svg += `<text x="${svgW-155}" y="${svgH-9}" fill="#64748b" font-size="8">지반고</text>`;
  svg += `<line x1="${svgW-110}" y1="${svgH-12}" x2="${svgW-90}" y2="${svgH-12}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>`;
  svg += `<text x="${svgW-85}" y="${svgH-9}" fill="#64748b" font-size="8">지지층EL</text>`;

  svg += `</svg>`;
  return `<div style="margin:16px 0">
    <div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">지반 단면도</div>
    <div style="overflow-x:auto">${svg}</div>
  </div>`;
}

function buildDashboardTable(bhs) {
  let html = `<table class="dash-table"><thead><tr>
    <th style="min-width:80px" onclick="sortDashboard('holeNo')">시추공 <span class="dash-sort-icon">&#8597;</span></th>
    <th style="min-width:70px" onclick="sortDashboard('groundEL')">지표고<br>(EL.m) <span class="dash-sort-icon">&#8597;</span></th>
    <th style="min-width:70px" onclick="sortDashboard('gwlEL')">지하수위<br>(EL.m) <span class="dash-sort-icon">&#8597;</span></th>
    <th style="min-width:70px" onclick="sortDashboard('wrEL')">풍화암<br>(EL.m) <span class="dash-sort-icon">&#8597;</span></th>
    <th style="min-width:70px" onclick="sortDashboard('srEL')">연암<br>(EL.m) <span class="dash-sort-icon">&#8597;</span></th>
    <th style="min-width:70px" onclick="sortDashboard('endEL')">시추종료<br>(EL.m) <span class="dash-sort-icon">&#8597;</span></th>
    <th style="min-width:100px">N값 추이</th>
    <th style="min-width:160px">토질 구성</th>
    <th>상세</th>
    <th></th>
  </tr></thead><tbody>`;
  bhs.forEach(bh => {
    const realIdx = STATE.uploadedData.indexOf(bh);
    const gEL = bh.groundEL;
    const gwlEL = (gEL != null && bh.gwlDepth != null) ? '+' + (gEL - bh.gwlDepth).toFixed(2) : '-';
    const wrLayer = (bh.layers||[]).find(l => l.soilType && l.soilType.includes('풍화암'));
    const srLayer = (bh.layers||[]).find(l => l.soilType && l.soilType.includes('연암'));
    const wrEL = wrLayer && gEL != null && wrLayer.depthFrom != null ? '+' + (gEL - wrLayer.depthFrom).toFixed(2) : '-';
    const srEL = srLayer && gEL != null && srLayer.depthFrom != null ? '+' + (gEL - srLayer.depthFrom).toFixed(2) : '-';
    const maxD = (bh.layers||[]).reduce((mx,l) => Math.max(mx, l.depthTo||0), 0);
    const endEL = gEL != null && maxD > 0 ? '+' + (gEL - maxD).toFixed(2) : '-';
    // Sparkline
    const sparkW = 100;
    let spark = `<svg width="${sparkW}" height="16" style="vertical-align:middle">`;
    if (bh.sptData && bh.sptData.length > 0) {
      const step = sparkW / Math.max(bh.sptData.length, 1);
      bh.sptData.forEach((s,j) => {
        const h = (Math.min(s.N,50)/50)*14;
        spark += `<rect x="${j*step}" y="${16-h}" width="${Math.max(step-1,2)}" height="${h}" fill="${s.N>=50?'#2E7D32':'#1976d2'}" rx="1"/>`;
      });
    }
    spark += '</svg>';
    // Soil badges
    const soilBadges = (bh.layers||[]).map(l => {
      const cls = SOIL_CLS[l.soilType]||'sand';
      return `<span class="soil-badge ${cls}" style="margin:1px 2px;font-size:10px">${l.soilType.replace(/\(.+\)/,'')} ${l.thickness.toFixed(1)}m</span>`;
    }).join('');
    const isActive = bh.holeNo === STATE.boreholeNo;
    html += `<tr class="${isActive?'dash-active':''}" onclick="dashboardSelectBorehole(${realIdx})">
      <td style="font-weight:700;color:var(--primary-navy)">${bh.holeNo}</td>
      <td>+${gEL!=null?gEL.toFixed(2):'-'}</td>
      <td>${gwlEL}</td>
      <td>${wrEL}</td>
      <td>${srEL}</td>
      <td>${endEL}</td>
      <td>${spark}</td>
      <td class="soil-col">${soilBadges}</td>
      <td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();dashboardOpenLog(${realIdx})" style="font-size:10px">로그 보기</button></td>
      <td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();dashboardDeleteBorehole(${realIdx})" style="font-size:10px;padding:2px 8px;color:#9ca3af">&#10005;</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

let _dashSortField = null, _dashSortDir = 'asc';
function sortDashboard(field) {
  if (_dashSortField === field) _dashSortDir = _dashSortDir === 'asc' ? 'desc' : 'asc';
  else { _dashSortField = field; _dashSortDir = 'asc'; }
  const bhs = [...(STATE.uploadedData||[])];
  bhs.sort((a, b) => {
    if (field === 'holeNo') return _dashSortDir === 'asc' ? naturalCompare(a.holeNo, b.holeNo) : naturalCompare(b.holeNo, a.holeNo);
    let va = 0, vb = 0;
    const gA = a.groundEL||0, gB = b.groundEL||0;
    if (field === 'groundEL') { va = gA; vb = gB; }
    else if (field === 'gwlEL') { va = gA-(a.gwlDepth||0); vb = gB-(b.gwlDepth||0); }
    else if (field === 'wrEL') {
      const wA = (a.layers||[]).find(l=>l.soilType&&l.soilType.includes('풍화암'));
      const wB = (b.layers||[]).find(l=>l.soilType&&l.soilType.includes('풍화암'));
      va = wA ? gA-(wA.depthFrom||0) : -9999; vb = wB ? gB-(wB.depthFrom||0) : -9999;
    } else if (field === 'srEL') {
      const sA = (a.layers||[]).find(l=>l.soilType&&l.soilType.includes('연암'));
      const sB = (b.layers||[]).find(l=>l.soilType&&l.soilType.includes('연암'));
      va = sA ? gA-(sA.depthFrom||0) : -9999; vb = sB ? gB-(sB.depthFrom||0) : -9999;
    } else if (field === 'endEL') {
      const mA = (a.layers||[]).reduce((mx,l)=>Math.max(mx,l.depthTo||0),0);
      const mB = (b.layers||[]).reduce((mx,l)=>Math.max(mx,l.depthTo||0),0);
      va = mA>0 ? gA-mA : -9999; vb = mB>0 ? gB-mB : -9999;
    }
    return _dashSortDir === 'asc' ? va - vb : vb - va;
  });
  const wrap = document.getElementById('dashTableWrap');
  if (wrap) wrap.innerHTML = buildDashboardTable(bhs);
}
function filterDashboardTable() {
  const q = (document.getElementById('dashSearch')?.value||'').toLowerCase();
  const soil = document.getElementById('dashSoilFilter')?.value||'';
  let filtered = STATE.uploadedData||[];
  if (q) filtered = filtered.filter(b => b.holeNo.toLowerCase().includes(q));
  if (soil) filtered = filtered.filter(b => (b.layers||[]).some(l => l.soilType === soil));
  const wrap = document.getElementById('dashTableWrap');
  if (wrap) wrap.innerHTML = buildDashboardTable(filtered);
}

// --- Random number generators ---
function boxMullerRandom() { let u1; do{u1=Math.random()}while(u1===0); return Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*Math.random()); }
function normalRandom(m,s) { return m + boxMullerRandom()*s; }
function uniformRandom(lo,hi) { return lo + Math.random()*(hi-lo); }
function calcMCPercentile(sorted,p) { const i=(sorted.length-1)*p; const lo=Math.floor(i),hi=Math.ceil(i); return sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo); }

// ===== TORNADO ANALYSIS =====
function toggleAdvancedTornado() {
  const panel = document.getElementById('tornadoAdvanced');
  const btn = document.getElementById('tornadoAdvBtn');
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : '';
  if (btn) { btn.classList.toggle('open', !isOpen); btn.textContent = isOpen ? '고급 설정' : '고급 설정 닫기'; }
}
function runTornadoAnalysis() {
  const targetEl = document.querySelector('input[name="tornadoTarget"]:checked');
  const target = targetEl ? targetEl.value : 'Qa_applied';
  const globalRange = parseFloat(document.getElementById('tornadoRange')?.value || 0.2);
  const advPanel = document.getElementById('tornadoAdvanced');
  const useAdvanced = advPanel && advPanel.style.display !== 'none';
  const baseParams = buildCalcPileParams();
  let baseResult;
  try { baseResult = calcPile(baseParams); } catch(e) { return; }
  const baseline = baseResult[target];
  if (baseline == null || baseline === 0) return;
  const results = [];
  TORNADO_PARAMS.forEach((tp, idx) => {
    if (useAdvanced) {
      const chk = document.getElementById('tAdv_chk_'+idx);
      if (chk && !chk.checked) return;
    }
    const range = useAdvanced ? (parseFloat(document.getElementById('tAdv_pct_'+idx)?.value || 20) / 100) : globalRange;
    const baseVal = baseParams[tp.key];
    if (baseVal == null || baseVal === 0) return;
    let rHigh, rLow;
    try { rHigh = calcPile(buildCalcPileParams({[tp.key]: baseVal*(1+range)})); } catch(e) { rHigh = null; }
    try { rLow = calcPile(buildCalcPileParams({[tp.key]: baseVal*(1-range)})); } catch(e) { rLow = null; }
    const dHigh = rHigh ? ((rHigh[target]-baseline)/baseline)*100 : 0;
    const dLow = rLow ? ((rLow[target]-baseline)/baseline)*100 : 0;
    results.push({ label:tp.label, baseVal, unit:tp.unit, dHigh, dLow, impact:Math.abs(dHigh)+Math.abs(dLow) });
  });
  results.sort((a,b) => b.impact - a.impact);
  SENS_STATE.tornadoResults = { target, range, baseline, results };
  const labels = {Qa_applied:'수직지지력 Qa (kN)',Ha_applied:'수평지지력 Ha (kN)',St:'침하량 St (mm)'};
  const interpEl = document.getElementById('tornadoInterp');
  if (interpEl) interpEl.innerHTML = generateTornadoInterpretation(SENS_STATE.tornadoResults);
  document.getElementById('tornadoChart').innerHTML = renderTornadoSVG(results, labels[target]||target, baseline);
}

function renderTornadoSVG(data, label, baseline) {
  if (!data.length) return '<p style="color:var(--text-muted)">분석할 파라미터가 없습니다.</p>';
  const W=700, rowH=32, padT=50, padB=30, padL=140, padR=60;
  const H = padT + data.length*rowH + padB;
  const maxAbs = Math.max(...data.map(d => Math.max(Math.abs(d.dHigh),Math.abs(d.dLow))), 1);
  const halfW = (W-padL-padR)/2;
  const cx = padL + halfW;
  let svg = `<svg width="${W}" height="${H}" style="font-family:var(--font-body)">`;
  // Title
  svg += `<text x="${W/2}" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="var(--primary-navy)">${label} 민감도 (기준값: ${fmt(baseline)})</text>`;
  // Axis
  svg += `<line x1="${cx}" y1="${padT-10}" x2="${cx}" y2="${H-padB}" stroke="var(--primary-navy)" stroke-width="2" stroke-dasharray="4,2"/>`;
  // Grid labels
  [-maxAbs, -maxAbs/2, 0, maxAbs/2, maxAbs].forEach(v => {
    const x = cx + (v/maxAbs)*halfW;
    svg += `<text x="${x}" y="${padT-14}" text-anchor="middle" font-size="8" fill="var(--text-muted)">${v>0?'+':''}${v.toFixed(1)}%</text>`;
    svg += `<line x1="${x}" y1="${padT-8}" x2="${x}" y2="${H-padB}" stroke="#eee" stroke-width="0.5"/>`;
  });
  data.forEach((d,i) => {
    const y = padT + i*rowH;
    const yMid = y + rowH/2;
    // Label
    svg += `<text x="${padL-8}" y="${yMid+4}" text-anchor="end" font-size="10" fill="var(--text-primary)">${d.label}</text>`;
    // Low bar (left of center if negative)
    const xLow = cx + (Math.min(d.dLow,0)/maxAbs)*halfW;
    const wLow = Math.abs(d.dLow/maxAbs)*halfW;
    if (wLow > 0.5) svg += `<rect x="${d.dLow<0?xLow:cx}" y="${yMid-10}" width="${wLow}" height="20" rx="3" fill="${d.dLow<0?'#ef4444':'#3b82f6'}" opacity="0.8"><title>-${(d.baseVal*(1-SENS_STATE.tornadoResults?.range||0.2)).toFixed(2)} → ${d.dLow>0?'+':''}${d.dLow.toFixed(1)}%</title></rect>`;
    // High bar
    const xHigh = cx;
    const wHigh = Math.abs(d.dHigh/maxAbs)*halfW;
    if (wHigh > 0.5) svg += `<rect x="${d.dHigh>0?cx:cx-(wHigh)}" y="${yMid-10}" width="${wHigh}" height="20" rx="3" fill="${d.dHigh>0?'#3b82f6':'#ef4444'}" opacity="0.8"><title>+${(d.baseVal*(1+(SENS_STATE.tornadoResults?.range||0.2))).toFixed(2)} → ${d.dHigh>0?'+':''}${d.dHigh.toFixed(1)}%</title></rect>`;
    // Value labels
    if (Math.abs(d.dLow) > 0.5) svg += `<text x="${cx + (d.dLow/maxAbs)*halfW + (d.dLow<0?-4:4)}" y="${yMid+3}" text-anchor="${d.dLow<0?'end':'start'}" font-size="8" fill="var(--text-secondary)" font-family="var(--font-mono)">${d.dLow>0?'+':''}${d.dLow.toFixed(1)}%</text>`;
    if (Math.abs(d.dHigh) > 0.5) svg += `<text x="${cx + (d.dHigh/maxAbs)*halfW + (d.dHigh>0?4:-4)}" y="${yMid+3}" text-anchor="${d.dHigh>0?'start':'end'}" font-size="8" fill="var(--text-secondary)" font-family="var(--font-mono)">${d.dHigh>0?'+':''}${d.dHigh.toFixed(1)}%</text>`;
  });
  // Legend
  svg += `<rect x="${W-150}" y="${H-25}" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.8"/><text x="${W-134}" y="${H-16}" font-size="9" fill="var(--text-muted)">증가</text>`;
  svg += `<rect x="${W-90}" y="${H-25}" width="12" height="12" rx="2" fill="#ef4444" opacity="0.8"/><text x="${W-74}" y="${H-16}" font-size="9" fill="var(--text-muted)">감소</text>`;
  svg += '</svg>';
  return svg;
}

// ===== MONTE CARLO SIMULATION =====
async function runMonteCarloSimulation() {
  const btn = document.getElementById('mcRunBtn');
  const wrap = document.getElementById('mcProgressWrap');
  const bar = document.getElementById('mcProgressBar');
  const container = document.getElementById('mcResults');
  if (!STATE.result) return;
  btn.disabled = true; btn.textContent = '시뮬레이션 실행 중...';
  wrap.style.display = ''; bar.style.width = '0%';
  const N = parseInt(document.getElementById('mcIterations')?.value || 1000);
  const ncv = parseFloat(document.getElementById('mcNcv')?.value || 0.3);
  const gelSigma = parseFloat(document.getElementById('mcGelSigma')?.value || 0.5);
  const gwlSigma = parseFloat(document.getElementById('mcGwlSigma')?.value || 1.0);
  const BATCH=100;
  const results = {Qa:[],Ha:[],St:[]};
  for (let batch=0; batch<N; batch+=BATCH) {
    await new Promise(resolve => setTimeout(() => {
      for (let i=batch; i<Math.min(batch+BATCH,N); i++) {
        const sptP = STATE.sptData.map(s => ({...s, N:Math.max(1,Math.round(normalRandom(s.N,s.N*ncv)))}));
        const layersP = STATE.layers.map(l => ({...l, avgN:Math.max(1,normalRandom(l.avgN||5,Math.max(l.avgN||5,1)*ncv))}));
        const p = buildCalcPileParams({
          groundEL: normalRandom(STATE.groundEL,gelSigma),
          gwlDepth: Math.max(0,normalRandom(STATE.gwlDepth,gwlSigma)),
          coeff_tip: uniformRandom(200,300),
          coeff_sand: uniformRandom(1.5,2.5),
          coeff_clay: uniformRandom(5.0,7.5),
          sptData: sptP, layers: layersP
        });
        try { const r=calcPile(p); results.Qa.push(r.Qa_applied); results.Ha.push(r.Ha_applied); results.St.push(r.St); } catch(e) {}
      }
      bar.style.width = (Math.min(batch+BATCH,N)/N*100)+'%';
      resolve();
    }, 0));
  }
  wrap.style.display = 'none';
  btn.disabled = false; btn.textContent = '\u25B6 시뮬레이션 실행';
  renderMCResults(results);
}

function renderMCResults(results) {
  const container = document.getElementById('mcResults');
  const stats = {};
  ['Qa','Ha','St'].forEach(k => {
    const arr = results[k].slice().sort((a,b)=>a-b);
    if (!arr.length) { stats[k] = null; return; }
    const mean = arr.reduce((s,v)=>s+v,0)/arr.length;
    const variance = arr.reduce((s,v)=>s+(v-mean)**2,0)/arr.length;
    stats[k] = {
      mean, std: Math.sqrt(variance),
      p5: calcMCPercentile(arr,0.05), p50: calcMCPercentile(arr,0.5), p95: calcMCPercentile(arr,0.95),
      min: arr[0], max: arr[arr.length-1], n: arr.length
    };
    // Failure probability (use UI targets if available)
    const tgtQa = parseFloat(document.getElementById('mcTargetQa')?.value || 800);
    const tgtHa = parseFloat(document.getElementById('mcTargetHa')?.value || 50);
    const tgtSt = parseFloat(document.getElementById('mcTargetSt')?.value || 25);
    if (k==='St') stats[k].pf = arr.filter(v=>v>tgtSt).length/arr.length;
    else { const tgt = k==='Qa'?tgtQa:tgtHa; stats[k].pf = arr.filter(v=>v<tgt).length/arr.length; }
  });
  SENS_STATE.mcStatistics = stats;
  SENS_STATE.mcRawResults = results;
  let html = generateMCInterpretation(stats);
  html += '<div class="mc-histograms">';
  const mcTgtQa = parseFloat(document.getElementById('mcTargetQa')?.value || 800);
  const mcTgtHa = parseFloat(document.getElementById('mcTargetHa')?.value || 50);
  const mcTgtSt = parseFloat(document.getElementById('mcTargetSt')?.value || 25);
  const cfgs = [
    {k:'Qa',label:'수직지지력 Qa',unit:'kN',color:'#3b82f6',tgt:mcTgtQa,tgtLabel:'목표 '+mcTgtQa+'kN',inv:false},
    {k:'Ha',label:'수평지지력 Ha',unit:'kN',color:'#8b5cf6',tgt:mcTgtHa,tgtLabel:'목표 '+mcTgtHa+'kN',inv:false},
    {k:'St',label:'침하량 St',unit:'mm',color:'#f59e0b',tgt:mcTgtSt,tgtLabel:'한계 '+mcTgtSt+'mm',inv:true}
  ];
  cfgs.forEach(c => {
    if (!stats[c.k]) return;
    html += `<div>${renderMCHistogramSVG(results[c.k],c.label,c.unit,c.color,c.tgt,c.tgtLabel)}</div>`;
  });
  html += '</div>';
  // Stats grid
  html += '<div class="mc-stats-grid">';
  cfgs.forEach(c => {
    const s = stats[c.k]; if (!s) return;
    const pfColor = s.pf > 0.1 ? 'var(--status-fail)' : s.pf > 0.05 ? 'var(--status-warning)' : 'var(--status-pass)';
    html += `<div class="mc-stat-card">
      <div style="font-size:11px;font-weight:700;color:var(--primary-navy);margin-bottom:6px">${c.label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;text-align:left;font-size:10px">
        <span>평균</span><span class="mc-sv" style="font-size:12px">${fmt(s.mean)}</span>
        <span>표준편차</span><span style="font-family:var(--font-mono)">${fmt(s.std)}</span>
        <span>P5</span><span style="font-family:var(--font-mono)">${fmt(s.p5)}</span>
        <span>P50</span><span style="font-family:var(--font-mono)">${fmt(s.p50)}</span>
        <span>P95</span><span style="font-family:var(--font-mono)">${fmt(s.p95)}</span>
        <span style="font-weight:700">Pf (파괴확률)</span><span style="font-family:var(--font-mono);color:${pfColor};font-weight:700">${(s.pf*100).toFixed(1)}%</span>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderMCHistogramSVG(values, label, unit, color, tgt, tgtLabel) {
  const W=280, H=180, m={t:30,r:10,b:35,l:40};
  const cW=W-m.l-m.r, cH=H-m.t-m.b;
  const sorted = values.slice().sort((a,b)=>a-b);
  const min=sorted[0], max=sorted[sorted.length-1];
  const bins=20, binW=(max-min)/bins||1;
  const counts=new Array(bins).fill(0);
  sorted.forEach(v => { const i=Math.min(Math.floor((v-min)/binW),bins-1); counts[i]++; });
  const maxC=Math.max(...counts);
  let svg = `<svg width="${W}" height="${H}" style="font-family:var(--font-body)">`;
  svg += `<text x="${W/2}" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="var(--primary-navy)">${label} (${unit})</text>`;
  // Bars
  const bw = cW/bins;
  counts.forEach((c,i) => {
    const h = (c/maxC)*cH;
    svg += `<rect x="${m.l+i*bw}" y="${m.t+cH-h}" width="${bw-1}" height="${h}" fill="${color}" opacity="0.7" rx="1"><title>${(min+i*binW).toFixed(1)}~${(min+(i+1)*binW).toFixed(1)}: ${c}회</title></rect>`;
  });
  // Target line
  if (tgt >= min && tgt <= max) {
    const tx = m.l + ((tgt-min)/(max-min))*cW;
    svg += `<line x1="${tx}" y1="${m.t}" x2="${tx}" y2="${m.t+cH}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>`;
    svg += `<text x="${tx}" y="${m.t-4}" text-anchor="middle" font-size="7" fill="#dc2626">${tgtLabel}</text>`;
  }
  // Mean line
  const mean = values.reduce((s,v)=>s+v,0)/values.length;
  const mx = m.l + ((mean-min)/(max-min||1))*cW;
  svg += `<line x1="${mx}" y1="${m.t}" x2="${mx}" y2="${m.t+cH}" stroke="var(--primary-navy)" stroke-width="1.5"/>`;
  svg += `<text x="${mx}" y="${H-5}" text-anchor="middle" font-size="7" fill="var(--primary-navy)">avg=${fmt(mean)}</text>`;
  // Axes
  svg += `<line x1="${m.l}" y1="${m.t+cH}" x2="${m.l+cW}" y2="${m.t+cH}" stroke="#ccc" stroke-width="1"/>`;
  svg += `<text x="${m.l}" y="${H-8}" font-size="7" fill="var(--text-muted)">${fmt(min)}</text>`;
  svg += `<text x="${m.l+cW}" y="${H-8}" text-anchor="end" font-size="7" fill="var(--text-muted)">${fmt(max)}</text>`;
  svg += '</svg>';
  return svg;
}

function runInverseDesign() {
  if (!STATE.uploadedData || !STATE.uploadedData.length) { showToast('시추공 데이터가 없습니다','error'); return; }
  const tQa = parseFloat(document.getElementById('invTargetQa').value) || 800;
  const tHa = parseFloat(document.getElementById('invTargetHa').value) || 50;
  const tSt = parseFloat(document.getElementById('invTargetSt').value) || 25;
  const results = STATE.uploadedData.map(bh => {
    const r = BH_RESULTS[bh.holeNo];
    const spec = findMinimumSpec(bh, tQa, tHa, tSt);
    return { holeNo: bh.holeNo, current: r, ...spec };
  });
  renderInverseResults(results, tQa, tHa, tSt);
}

function findMinimumSpec(bh, tQa, tHa, tSt) {
  const r = BH_RESULTS[bh.holeNo];
  if (r && r.Qa_applied >= tQa && r.Ha_applied >= tHa && r.St <= tSt) {
    return { status:'pass', change:null, improved:r };
  }
  const diameters = [400,450,500,600,700,800,1000];
  const embeds = [1,2,3,4,5];
  const curD = (bh.designParams||{}).diameter_mm || STATE.diameter_mm;
  for (const d of diameters) {
    if (d < curD) continue;
    for (const e of embeds) {
      try {
        const p = buildCalcPileParamsForBh(bh, {diameter_mm:d, embedDepth:e});
        const nr = calcPile(p);
        if (nr.Qa_applied >= tQa && nr.Ha_applied >= tHa && nr.St <= tSt) {
          if (d === curD && e === ((bh.designParams||{}).embedDepth || STATE.embedDepth)) return {status:'pass',change:null,improved:nr};
          return { status:'optimized', change:{diameter_mm:d,embedDepth:e}, improved:nr };
        }
      } catch(e) {}
    }
  }
  return { status:'fail', change:null, improved:null };
}

function renderInverseResults(results, tQa, tHa, tSt) {
  const container = document.getElementById('invResults');
  const passN = results.filter(r=>r.status==='pass').length;
  const optN = results.filter(r=>r.status==='optimized').length;
  const failN = results.filter(r=>r.status==='fail').length;
  let html = generateInverseInterpretation(passN, optN, failN, results.length);
  html += `<div class="dash-stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">
    <div class="dash-stat"><div class="ds-val" style="color:var(--status-pass)">${passN}</div><div class="ds-label">현재 사양 충족</div></div>
    <div class="dash-stat"><div class="ds-val" style="color:var(--status-warning)">${optN}</div><div class="ds-label">사양 변경 필요</div></div>
    <div class="dash-stat"><div class="ds-val" style="color:var(--status-fail)">${failN}</div><div class="ds-label">달성 불가</div></div>
  </div>`;
  html += `<div class="dash-table-wrap"><table class="dash-table" style="font-size:10px"><thead><tr>
    <th>시추공</th><th>현재 Qa</th><th>현재 Ha</th><th>현재 St</th><th>판정</th><th>추천 직경</th><th>추천 근입</th><th>개선 Qa</th><th>개선 Ha</th><th>개선 St</th>
  </tr></thead><tbody>`;
  results.forEach(r => {
    const ic = r.status==='pass'?'traffic-green':r.status==='optimized'?'traffic-yellow':'traffic-red';
    const lbl = r.status==='pass'?'충족':r.status==='optimized'?'변경':'\u2717';
    const c = r.current;
    html += `<tr>
      <td style="font-weight:700">${r.holeNo}</td>
      <td style="color:${c&&c.Qa_applied>=tQa?'var(--status-pass)':'var(--status-fail)'}">${c?fmt(c.Qa_applied):'-'}</td>
      <td style="color:${c&&c.Ha_applied>=tHa?'var(--status-pass)':'var(--status-fail)'}">${c?fmt(c.Ha_applied):'-'}</td>
      <td style="color:${c&&c.St<=tSt?'var(--status-pass)':'var(--status-fail)'}">${c?fmt(c.St):'-'}</td>
      <td><span class="traffic-icon ${ic}"></span>${lbl}</td>
      <td>${r.change?r.change.diameter_mm+'mm':'-'}</td>
      <td>${r.change?r.change.embedDepth+'m':'-'}</td>
      <td>${r.improved?fmt(r.improved.Qa_applied):'-'}</td>
      <td>${r.improved?fmt(r.improved.Ha_applied):'-'}</td>
      <td>${r.improved?fmt(r.improved.St):'-'}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

// ===== SPATIAL INTELLIGENCE (Feature 3) =====
function getBoreholePositions() {
  if (!STATE.uploadedData) return [];
  return STATE.uploadedData.map((bh, idx) => {
    let x = bh.coordX, y = bh.coordY;
    if (x == null || y == null || isNaN(x) || isNaN(y)) {
      const cols = Math.ceil(Math.sqrt(STATE.uploadedData.length));
      x = (idx % cols) * 100; y = Math.floor(idx / cols) * 100;
    }
    return { holeNo:bh.holeNo, x, y, idx };
  });
}

function interpolateColor(val, min, max, invert) {
  let t = max > min ? (val - min) / (max - min) : 0.5;
  if (invert) t = 1 - t;
  t = Math.max(0, Math.min(1, t));
  // green(0) -> yellow(0.5) -> red(1)
  const r = t < 0.5 ? Math.round(255 * t * 2) : 255;
  const g = t < 0.5 ? 255 : Math.round(255 * (1 - (t - 0.5) * 2));
  return `rgb(${r},${g},60)`;
}

function calcIDWValue(px, py, positions, values, power) {
  power = power || 2;
  let wSum=0, vSum=0;
  positions.forEach((pos,i) => {
    const dist = Math.sqrt((px-pos.x)**2 + (py-pos.y)**2);
    if (dist < 0.001) { wSum=1e10; vSum=values[i]*1e10; return; }
    const w = 1/Math.pow(dist,power);
    wSum += w; vSum += w*values[i];
  });
  return wSum > 0 ? vSum/wSum : 0;
}

function detectSpatialAnomalies(values) {
  const mean = values.reduce((s,v)=>s+v,0)/values.length;
  const std = Math.sqrt(values.reduce((s,v)=>s+(v-mean)**2,0)/values.length);
  return values.map(v => Math.abs(v-mean) > 2*std);
}

function renderSpatialMap(metric) {
  metric = metric || 'Qa_applied';
  const container = document.getElementById('spatialMapContainer');
  if (!container) return;
  const positions = getBoreholePositions();
  if (!positions.length) return;
  // Get values
  const values = positions.map(p => {
    const bh = STATE.uploadedData[p.idx];
    const r = BH_RESULTS[bh.holeNo];
    if (metric === 'groundEL') return bh.groundEL || 0;
    return r ? r[metric] || 0 : 0;
  });
  const invert = metric === 'St'; // higher St is worse
  // Normalize coords
  const xs = positions.map(p=>p.x), ys = positions.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const rangeX = maxX-minX||100, rangeY = maxY-minY||100;
  const W=600, H=400, pad=40;
  const norm = pos => ({ x: pad + (pos.x-minX)/rangeX*(W-2*pad), y: pad + (maxY-pos.y)/rangeY*(H-2*pad) });
  const normPositions = positions.map(norm);
  const minV=Math.min(...values), maxV=Math.max(...values);
  const anomalies = detectSpatialAnomalies(values);
  // IDW heatmap
  const gridN = 20;
  let svg = `<svg class="spatial-svg" width="${W}" height="${H}" onmouseleave="document.getElementById('spatialTooltip').style.display='none'">`;
  for (let gy=0; gy<gridN; gy++) {
    for (let gx=0; gx<gridN; gx++) {
      const px = pad + (gx+0.5)/(gridN)*(W-2*pad);
      const py = pad + (gy+0.5)/(gridN)*(H-2*pad);
      // Map back to original coords
      const origX = minX + (px-pad)/(W-2*pad)*rangeX;
      const origY = maxY - (py-pad)/(H-2*pad)*rangeY;
      const v = calcIDWValue(origX, origY, positions, values);
      const color = interpolateColor(v, minV, maxV, invert);
      const cw = (W-2*pad)/gridN, ch = (H-2*pad)/gridN;
      svg += `<rect x="${pad+gx*cw}" y="${pad+gy*ch}" width="${cw}" height="${ch}" fill="${color}" opacity="0.4"/>`;
    }
  }
  // Borehole markers
  normPositions.forEach((np, i) => {
    const v = values[i];
    const color = interpolateColor(v, minV, maxV, invert);
    const r = anomalies[i] ? 14 : 10;
    if (anomalies[i]) svg += `<circle cx="${np.x}" cy="${np.y}" r="16" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,2"/>`;
    svg += `<circle cx="${np.x}" cy="${np.y}" r="${r}" fill="${color}" stroke="#fff" stroke-width="2" cursor="pointer"
      onmouseover="showSpatialTip(event,${i},'${metric}')" onmouseout="document.getElementById('spatialTooltip').style.display='none'"/>`;
    svg += `<text x="${np.x}" y="${np.y-r-4}" text-anchor="middle" font-size="8" fill="var(--text-secondary)">${positions[i].holeNo}</text>`;
  });
  // Legend
  const labels = {Qa_applied:'Qa (kN)',Ha_applied:'Ha (kN)',St:'St (mm)',groundEL:'EL (m)'};
  svg += `<defs><linearGradient id="spatialGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="${interpolateColor(minV,minV,maxV,invert)}"/>
    <stop offset="50%" stop-color="${interpolateColor((minV+maxV)/2,minV,maxV,invert)}"/>
    <stop offset="100%" stop-color="${interpolateColor(maxV,minV,maxV,invert)}"/>
  </linearGradient></defs>`;
  svg += `<rect x="${W/2-70}" y="${H-25}" width="140" height="10" rx="2" fill="url(#spatialGrad)"/>`;
  svg += `<text x="${W/2-75}" y="${H-18}" text-anchor="end" font-size="8" fill="var(--text-muted)">${fmt(invert?maxV:minV)}</text>`;
  svg += `<text x="${W/2+75}" y="${H-18}" text-anchor="start" font-size="8" fill="var(--text-muted)">${fmt(invert?minV:maxV)}</text>`;
  svg += `<text x="${W/2}" y="${H-5}" text-anchor="middle" font-size="9" fill="var(--text-secondary)">${labels[metric]||metric}</text>`;
  svg += '</svg>';
  container.innerHTML = svg;
}

// ===== RISK DASHBOARD (Feature 5) =====
function calcRiskScore(r, targets) {
  targets = targets || {Qa:800, Ha:50, St:25};
  if (!r) return { score:0, grade:'E', factors:{} };
  const sfQa = r.Qa_applied / targets.Qa;
  const sfHa = r.Ha_applied / targets.Ha;
  const sfSt = targets.St / Math.max(r.St, 0.01);
  const composite = Math.pow(Math.max(sfQa,0.01) * Math.max(sfHa,0.01) * Math.max(sfSt,0.01), 1/3);
  let grade;
  if (composite >= 2.0) grade='A'; else if (composite >= 1.5) grade='B';
  else if (composite >= 1.0) grade='C'; else if (composite >= 0.7) grade='D'; else grade='E';
  return { score:composite, grade, factors:{sfQa,sfHa,sfSt} };
}

function calcSiteRiskGrade(scores) {
  if (!scores.length) return {grade:'E',avg:0,min:0};
  const grades = scores.map(s=>s.grade);
  const worst = ['E','D','C','B','A'].find(g => grades.includes(g)) || 'E';
  const avg = scores.reduce((s,sc)=>s+sc.score,0)/scores.length;
  return { grade:worst, avg, min:Math.min(...scores.map(s=>s.score)) };
}

function buildRiskDashboardSection() {
  if (!STATE.uploadedData || STATE.uploadedData.length < 2) return '';

  const site = calcSiteRiskGrade(scores);
  const gradeColors = {A:'#16a34a',B:'#65a30d',C:'#ca8a04',D:'#d97706',E:'#6b7280'};
  let html = `<div class="sens-section" style="margin-top:24px">

    <div class="risk-cards">

  // Individual grade distribution

    html += `<div class="risk-card grade-${g.toLowerCase()}">

      <div class="risk-grade-label">등급 ${g}</div>

  });
  html += `</div>`;

  // What-If panel
  html += `<div class="whatif-panel">

  </div>
  ${buildFeatureHelpHTML('whatif')}
  <div id="whatifResults"></div>`;
  html += '</div>';
  return html;
}

function renderSafetyMarginChart(scores) {
  const W=Math.max(700,scores.length*50+100), H=250, m={t:30,r:20,b:50,l:40};
  const cW=W-m.l-m.r, cH=H-m.t-m.b;
  const barGroup = cW/scores.length;
  const barW = barGroup*0.25;
  let svg = `<svg width="${W}" height="${H}" style="font-family:var(--font-body)">`;
  svg += `<text x="${W/2}" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="var(--primary-navy)">시추공별 안전율</text>`;
  // Reference line at 1.0
  const maxSF = Math.max(3, ...scores.flatMap(s=>[s.factors.sfQa||0,s.factors.sfHa||0,s.factors.sfSt||0]));
  const y1 = m.t + cH - (1.0/maxSF)*cH;
  svg += `<line x1="${m.l}" y1="${y1}" x2="${W-m.r}" y2="${y1}" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>`;
  svg += `<text x="${m.l-4}" y="${y1+3}" text-anchor="end" font-size="8" fill="#dc2626">1.0</text>`;
  // Grid
  svg += `<line x1="${m.l}" y1="${m.t+cH}" x2="${W-m.r}" y2="${m.t+cH}" stroke="#eee"/>`;
  scores.forEach((sc,i) => {
    const cx = m.l + i*barGroup + barGroup/2;
    const vals = [{v:sc.factors.sfQa,c:'#3b82f6',l:'Qa'},{v:sc.factors.sfHa,c:'#8b5cf6',l:'Ha'},{v:sc.factors.sfSt,c:'#f59e0b',l:'St'}];
    vals.forEach((vl,j) => {
      const h = Math.min(vl.v/maxSF,1)*cH;
      const x = cx + (j-1)*(barW+2);
      svg += `<rect x="${x-barW/2}" y="${m.t+cH-h}" width="${barW}" height="${h}" fill="${vl.c}" opacity="0.8" rx="2"><title>${sc.holeNo} ${vl.l}: ${vl.v.toFixed(2)}</title></rect>`;
    });
    svg += `<text x="${cx}" y="${H-m.b+14}" text-anchor="middle" font-size="7" fill="var(--text-secondary)" transform="rotate(-30,${cx},${H-m.b+14})">${sc.holeNo}</text>`;
  });
  // Legend
  [{c:'#3b82f6',l:'Qa 안전율'},{c:'#8b5cf6',l:'Ha 안전율'},{c:'#f59e0b',l:'St 여유율'}].forEach((lg,i) => {
    svg += `<rect x="${W-180+i*60}" y="${H-14}" width="10" height="10" rx="2" fill="${lg.c}"/><text x="${W-168+i*60}" y="${H-5}" font-size="8" fill="var(--text-muted)">${lg.l}</text>`;
  });
  svg += '</svg>';
  return svg;
}

function runWhatIfScenario(scenario) {
  if (!STATE.uploadedData) return;
  const container = document.getElementById('whatifResults');
  const sizes = [350,400,450,500,600,700,800,1000];
  const baseResults = {};
  STATE.uploadedData.forEach(bh => { baseResults[bh.holeNo] = BH_RESULTS[bh.holeNo]; });
  const newResults = {};
  let label = '';
  STATE.uploadedData.forEach(bh => {
    let overrides = {};
    if (scenario === 'gwl') {
      label = '지하수위 +1m 상승';
      overrides.gwlDepth = Math.max(0, (bh.gwlDepth != null ? bh.gwlDepth : STATE.gwlDepth) - 1);
    } else if (scenario === 'nval') {
      label = 'N값 20% 감소';
      overrides.sptData = (bh.sptData||[]).map(s=>({...s,N:Math.max(1,Math.round(s.N*0.8))}));
      overrides.layers = (bh.layers||[]).map(l=>({...l,avgN:Math.max(1,(l.avgN||5)*0.8)}));
    } else if (scenario === 'diam') {
      label = '직경 한 단계 상향';
      const curD = (bh.designParams||{}).diameter_mm || STATE.diameter_mm;
      const idx = sizes.indexOf(curD);
      overrides.diameter_mm = idx >= 0 && idx < sizes.length-1 ? sizes[idx+1] : curD;
    }
    try { newResults[bh.holeNo] = calcPile(buildCalcPileParamsForBh(bh, overrides)); } catch(e) { newResults[bh.holeNo] = null; }
  });
  // Render delta table
  let html = `<div style="font-size:11px;font-weight:700;color:var(--primary-navy);margin-bottom:8px">시나리오: ${label}</div>`;
  html += `<div class="dash-table-wrap"><table class="dash-table" style="font-size:10px"><thead><tr>
    <th>시추공</th><th>현재 Qa</th><th>변경 Qa</th><th>&Delta;</th><th>현재 Ha</th><th>변경 Ha</th><th>&Delta;</th><th>현재 St</th><th>변경 St</th><th>&Delta;</th>
  </tr></thead><tbody>`;
  STATE.uploadedData.forEach(bh => {
    const base = baseResults[bh.holeNo];
    const nw = newResults[bh.holeNo];
    const delta = (b,n,inv) => {
      if (!b||!n) return '-';
      const d = n - b;
      const pct = b !== 0 ? (d/Math.abs(b)*100).toFixed(1) : '0.0';
      const good = inv ? d < 0 : d > 0;
      return `<span class="whatif-delta ${good?'pos':'neg'}">${d>0?'+':''}${pct}%</span>`;
    };
    html += `<tr>
      <td style="font-weight:700">${bh.holeNo}</td>
      <td>${base?fmt(base.Qa_applied):'-'}</td><td>${nw?fmt(nw.Qa_applied):'-'}</td><td>${delta(base?.Qa_applied,nw?.Qa_applied,false)}</td>
      <td>${base?fmt(base.Ha_applied):'-'}</td><td>${nw?fmt(nw.Ha_applied):'-'}</td><td>${delta(base?.Ha_applied,nw?.Ha_applied,false)}</td>
      <td>${base?fmt(base.St):'-'}</td><td>${nw?fmt(nw.St):'-'}</td><td>${delta(base?.St,nw?.St,true)}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function buildOverallTable(bhs) {
  let html = `<table class="dash-table"><thead><tr>
    <th>시추공</th><th>지반고(m)</th><th>N값 분포</th><th>말뚝길이(m)</th>
    <th>Qa(kN)</th><th>Ha(kN)</th><th>인발(kN)</th><th>침하(mm)</th><th>판정</th><th></th>
  </tr></thead><tbody>`;
  bhs.forEach((bh, i) => {
    const r = BH_RESULTS[bh.holeNo];
    const sparkW = 80;
    let spark = `<svg width="${sparkW}" height="16" style="vertical-align:middle">`;
    if (bh.sptData) {
      const step = sparkW / Math.max(bh.sptData.length - 1, 1);
      bh.sptData.forEach((s, j) => {
        const h = (Math.min(s.N,50)/50)*14;
        spark += `<rect x="${j*step}" y="${16-h}" width="${Math.max(step-1,2)}" height="${h}" fill="${s.N>=50?'#2E7D32':'#1976d2'}" rx="1"/>`;
      });
    }
    spark += '</svg>';
    const ok = r && r.St < 25;
    html += `<tr>
      <td style="font-weight:700;color:var(--primary-navy);cursor:pointer" onclick="selectBoreholeFromSidebar(${i})">${bh.holeNo}</td>
      <td>${bh.groundEL != null ? bh.groundEL.toFixed(1) : '-'}</td>
      <td>${spark}</td>
      <td>${r ? fmt(r.pileLength) : '-'}</td>
      <td style="font-weight:700">${r ? fmt(r.Qa_applied) : '-'}</td>
      <td>${r ? fmt(r.Ha_applied) : '-'}</td>
      <td>${r ? fmt(r.Qpull) : '-'}</td>
      <td>${r ? fmt(r.St) : '-'}</td>
      <td><span style="color:${ok?'var(--status-pass)':'var(--status-fail)'};font-weight:700">${r ? (ok?'OK':'NG') : '-'}</span></td>
      <td><button class="btn btn-sm btn-outline" onclick="selectBoreholeFromSidebar(${i})">선택</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function filterOverallTable(q) {
  if (!STATE.uploadedData) return;
  const filtered = q ? STATE.uploadedData.filter(b => b.holeNo.toLowerCase().includes(q.toLowerCase())) : STATE.uploadedData;
  const wrap = document.getElementById('overallTableWrap');
  if (wrap) wrap.innerHTML = buildOverallTable(filtered);
}

  <tr><td class="left">말뚝 상단 EL</td><td>EL.${fmt(STATE.pileTopEL,2)} m</td><td class="left">지지층 EL (상단)</td><td>EL.${fmt(STATE.bearingEL,2)} m</td></tr>
  <tr><td class="left">근입 깊이</td><td>${fmt(r.embedDepth)} m</td><td class="left">선단 지지층 EL</td><td>EL.${fmt(r.tipEL,2)} m</td></tr>
  <tr><td class="left">절성토</td><td>${r.cutFillDepth > 0 ? '성토 '+fmt(r.fillHeight)+'m' : r.cutFillDepth < 0 ? '<span style="color:#1e40af;font-weight:600">절토 '+fmt(r.cutDepth)+'m</span>' : '없음'} (${fmt(r.cutFillDepth)} m)</td><td class="left">둘레 (U)</td><td>$\\pi D = \\pi \\times ${fmt(r.D,4)} = ${fmt(r.U,4)}$ m</td></tr>

  <tr><td class="left">선단면적 (Ap)</td><td>${fmt(r.Ap_tip,4)} m²</td><td class="left">순단면적 (An)</td><td>${fmt(r.Ap_net,4)} m²</td></tr>
  <tr><td class="left">단면계수 (Zp)</td><td>${fmtE(r.Zp)} m³</td><td class="left">휨강성 (EI)</td><td>${fmt(r.EI,1)} kN·m²</td></tr>
  <tr><td class="left">자중 (W)</td><td>${fmt(r.W_unit,2)} kN/m</td><td class="left">이음부</td><td>${STATE.jointType} × ${STATE.jointCount}개소</td></tr>
  ${!isPHC?`<tr><td class="left">부식두께</td><td>${STATE.corrosionThk} mm</td><td class="left">강관단면적 (At)</td><td>${fmt(r.At_steel,6)} m²</td></tr>
  <tr><td class="left">내부면적 (Ai)</td><td>${fmt(r.Ai_steel,6)} m²</td><td class="left">지지방법</td><td>${bearingMethodLabel(STATE.bearingMethod)}</td></tr>`:''}

  // SPT Data Table
  html += `<div style="margin-top:14px"><strong style="font-size:11px;color:var(--primary-navy)">SPT N값 현황</strong></div>
  <table style="margin-top:6px"><thead><tr><th>깊이(m)</th><th>N값</th><th>지층</th></tr></thead><tbody>
  ${STATE.sptData.map(s => `<tr><td>${fmt(s.depth,1)}</td><td style="font-weight:700;color:${s.N>=50?'var(--status-pass)':'var(--primary-navy)'}">${s.N}</td><td class="left">${s.remark||''}</td></tr>`).join('')}
  </tbody></table>`;

  // Layer Table
  html += `<div style="margin-top:14px"><strong style="font-size:11px;color:var(--primary-navy)">지층 평균 정리</strong></div>
  <table style="margin-top:6px"><thead><tr><th>지층</th><th>두께(m)</th><th>평균N</th><th>단위중량(kN/m³)</th><th>분류</th></tr></thead><tbody>
  ${STATE.layers.map(l => { const d = l._sptDetail || ''; const c = l._sptCount || 0; const tip = c > 0 ? '산정근거: ' + c + '개 SPT\\n' + d : 'SPT없음, 기본값 적용'; return `<tr><td class="left">${l.soilType}</td><td>${fmt(l.thickness)}</td><td><span class="calc-tip">${fmt(l.avgN,1)}<span class="tip-content">${tip}</span></span></td><td>${l.unitWeight}</td><td><span class="soil-badge ${SOIL_CLS[l.soilType]||'sand'}">${SOIL_CLS[l.soilType]||'sand'}</span></td></tr>`; }).join('')}
  </tbody></table></div>`;

  // ============ Section 2: 수직지지력 ============
  html += `<div class="report-section"><div class="report-title">2. 수직 허용지지력 (KDS 11 50 40)</div>`;

  // 2.1 Material
  html += `<div class="report-step"><span class="step-num">1</span><strong>재료 허용연직지지력 (Qp)</strong>
  <div style="margin-top:8px;font-size:11px;color:var(--text-secondary)">기준: KDS 11 50 40 (2018) — 말뚝재료의 허용연직지지력</div>
  <div style="margin-top:6px">$$Q_p = \\left(1 - \\frac{\\mu_1 + \\mu_2}{100}\\right) \\times Q_{ap}$$</div>

  <div style="margin-top:10px;padding:8px;background:#f8f9fa;border-radius:4px">
  <div style="font-size:11px;font-weight:600;color:var(--primary-navy);margin-bottom:4px">▸ 세장비 감소율 (μ₁)</div>
  <div style="font-size:11px">$L/d = ${fmt(r.pileLength)} \\div ${fmt(r.D,4)} = ${fmt(r.L_over_d,1)}$</div>
  <div style="font-size:11px">세장비 한계값 $n = ${r.n_slender}$ ${isPHC?'(PHC말뚝)':'(강관말뚝)'}</div>
  <div style="font-size:11px">${r.L_over_d > r.n_slender ?
    `$L/d = ${fmt(r.L_over_d,1)} > n = ${r.n_slender}$ 이므로 세장비 감소 적용` :
    `$L/d = ${fmt(r.L_over_d,1)} \\leq n = ${r.n_slender}$ 이므로 세장비 감소 없음`}</div>
  <div style="font-size:11px;font-weight:600">$\\mu_1 = ${r.mu1 > 0 ? `\\min\\left(\\left(\\frac{${fmt(r.L_over_d,1)}}{${r.n_slender}} - 1\\right) \\times 100,\\; 30\\right)` : '0'} = ${fmt(r.mu1)}\\%$</div>
  </div>

  <div style="margin-top:8px;padding:8px;background:#f8f9fa;border-radius:4px">
  <div style="font-size:11px;font-weight:600;color:var(--primary-navy);margin-bottom:4px">▸ 이음부 감소율 (μ₂)</div>
  <div style="font-size:11px">이음방법: ${STATE.jointType==='welding'?'용접':STATE.jointType==='bolt'?'볼트':'충전'}, 이음수: ${STATE.jointCount}개소</div>
  <div style="font-size:11px">${STATE.jointType==='welding' ? `용접이음: 1개소당 5% → ${STATE.jointCount} × 5 = ${fmt(r.mu2)}%` : STATE.jointType==='bolt' ? `볼트이음: 1개소당 10% → ${STATE.jointCount} × 10 = ${fmt(r.mu2)}%` : `충전이음: min(${STATE.jointCount},2)×20 + max(${STATE.jointCount}-2,0)×30 = ${fmt(r.mu2)}%`}</div>
  <div style="font-size:11px;font-weight:600">$\\mu_2 = ${fmt(r.mu2)}\\%$</div>
  </div>

  <div style="margin-top:8px;padding:8px;background:#f8f9fa;border-radius:4px">
  <div style="font-size:11px;font-weight:600;color:var(--primary-navy);margin-bottom:4px">▸ 허용축하중 (Qap)</div>
  <div style="font-size:11px">${isPHC ? `PHC ${STATE.phcGrade}종 D${STATE.diameter_mm}×${STATE.thickness_mm}t 규격값 (KS F 4306)` : `강관 D${STATE.diameter_mm}×${STATE.thickness_mm}t 규격값`}</div>
  <div style="font-size:11px;font-weight:600">$Q_{ap} = ${fmt(r.Qap)}$ kN</div>
  </div>

  <div style="margin-top:10px;padding:10px;background:#e8f5e9;border-radius:4px;border:1px solid #a5d6a7">
  <div style="font-size:12px;font-weight:700;color:var(--status-pass)">$Q_p = \\left(1 - \\frac{${fmt(r.mu1)} + ${fmt(r.mu2)}}{100}\\right) \\times ${fmt(r.Qap)} = \\left(1 - \\frac{${fmt(r.mu1+r.mu2)}}{100}\\right) \\times ${fmt(r.Qap)} = ${fmt(1-(r.mu1+r.mu2)/100, 4)} \\times ${fmt(r.Qap)} = ${fmt(r.Qp_material)}$ kN</div>
  </div></div>`;

  // 2.2 Rock tip (if applicable)
  if (!isPHC && r.rockCalcDetails) {
    const rc = r.rockCalcDetails;
    html += `<div class="report-step"><span class="step-num">2</span><strong>암반 선단지지력 — 구조물기초설계기준 (p305)</strong>
    <div style="margin-top:8px">$$P_u = 443 \\times q_u^{1/2} \\times A_t^{2/5} \\times A_i^{1/3}$$</div>
    <div style="margin-top:6px;font-size:11px">$q_u = \\min(${fmt(rc.qu_lab)},\\;10000) = ${fmt(rc.qu_eff)}$ kPa (일축압축강도, 상한 10,000 kPa 적용)</div>
    <div style="font-size:11px">$A_t = ${fmt(rc.At_m2,6)}$ m² (강관 순단면적)</div>
    <div style="font-size:11px">$A_i = ${fmt(rc.Ai_m2,6)}$ m² (강관 내부면적)</div>
    <div style="margin-top:6px;padding:8px;background:#fff3e0;border-radius:4px">
    <div style="font-size:11px;font-weight:700">$P_u = 443 \\times ${fmt(rc.qu_eff)}^{0.5} \\times ${fmt(rc.At_m2,6)}^{0.4} \\times ${fmt(rc.Ai_m2,6)}^{0.333}$</div>
    <div style="font-size:11px;font-weight:700">$= 443 \\times ${fmt(Math.pow(rc.qu_eff,0.5),2)} \\times ${fmt(Math.pow(rc.At_m2,0.4),4)} \\times ${fmt(Math.pow(rc.Ai_m2,1/3),4)} = ${fmt(rc.Pu_tip)}$ kN</div>
    </div></div>`;

    html += `<div class="report-step"><span class="step-num">3</span><strong>Goodman 방법 (도로교설계기준 2008, p863)</strong>
    <div style="margin-top:8px">$$Q_u = q_u \\times (N_\\phi + 1) \\times A_p$$</div>
    <div style="margin-top:6px;font-size:11px">$\\phi_{rock} = ${rc.phi_rock}°$ (암반 내부마찰각)</div>
    <div style="font-size:11px">$N_\\phi = \\tan^2\\left(45° + \\frac{${rc.phi_rock}°}{2}\\right) = \\tan^2(${45+rc.phi_rock/2}°) = ${fmt(rc.N_phi,3)}$</div>
    <div style="font-size:11px">$A_p = \\frac{\\pi}{4} D^2 = \\frac{\\pi}{4} \\times ${fmt(r.D,4)}^2 = ${fmt(rc.Ap_full,4)}$ m²</div>
    <div style="margin-top:6px;padding:8px;background:#fff3e0;border-radius:4px">
    <div style="font-size:11px;font-weight:700">$Q_u = ${fmt(rc.qu_lab)} \\times (${fmt(rc.N_phi,3)} + 1) \\times ${fmt(rc.Ap_full,4)} = ${fmt(rc.qu_lab)} \\times ${fmt(rc.N_phi+1,3)} \\times ${fmt(rc.Ap_full,4)} = ${fmt(rc.Pu_goodman)}$ kN</div>
    </div></div>`;

    html += `<div class="report-step"><span class="step-num">4</span><strong>Canadian FEM (도로교설계기준 2008, p862)</strong>
    <div style="margin-top:8px">$$Q_u = 3 \\times q_u \\times K_{sp} \\times d \\times A_p$$</div>
    <div style="margin-top:6px;font-size:11px">$S_d = ${rc.Sd}$ m (불연속면 간격), $t_d = ${rc.td}$ m (불연속면 두께)</div>
    <div style="font-size:11px">$$K_{sp} = \\frac{3 + S_d/D}{10\\sqrt{1 + 300 \\cdot t_d / S_d}} = \\frac{3 + ${rc.Sd}/${fmt(r.D,4)}}{10\\sqrt{1 + 300 \\times ${rc.td}/${rc.Sd}}} = \\frac{${fmt(3+rc.Sd/r.D,3)}}{10 \\times ${fmt(Math.sqrt(1+300*rc.td/rc.Sd),3)}} = ${fmt(rc.Ksp,4)}$$</div>
    <div style="margin-top:6px;padding:8px;background:#fff3e0;border-radius:4px">
    <div style="font-size:11px;font-weight:700">$Q_u = 3 \\times ${fmt(rc.qu_lab)} \\times ${fmt(rc.Ksp,4)} \\times 2 \\times ${fmt(rc.Ap_full,4)} = ${fmt(rc.Pu_canadian)}$ kN</div>
    </div></div>`;

    html += `<div class="report-step" style="background:#e3f2fd"><span class="step-num">5</span><strong>선단지지력 선정</strong>
    <div style="margin-top:6px;font-size:11px">3가지 방법 비교:</div>
    <table style="margin-top:4px"><thead><tr><th>방법</th><th>Pu (kN)</th></tr></thead><tbody>
    <tr><td class="left">구조물기초설계기준</td><td style="font-weight:700${rc.Pu_tip===rc.Pu_selected?';color:var(--status-pass)':''}">${fmt(rc.Pu_tip)}</td></tr>
    <tr><td class="left">Goodman</td><td style="font-weight:700${rc.Pu_goodman===rc.Pu_selected?';color:var(--status-pass)':''}">${fmt(rc.Pu_goodman)}</td></tr>
    <tr><td class="left">Canadian FEM</td><td style="font-weight:700${rc.Pu_canadian===rc.Pu_selected?';color:var(--status-pass)':''}">${fmt(rc.Pu_canadian)}</td></tr>
    </tbody></table>
    <div style="margin-top:6px;font-size:12px;font-weight:700;color:var(--status-pass)">$P_u = \\min(${fmt(rc.Pu_tip)},\\; ${fmt(rc.Pu_goodman)},\\; ${fmt(rc.Pu_canadian)}) = ${fmt(rc.Pu_selected)}$ kN ← 최솟값 채택</div>
    </div>`;
  }

  // 2.3 Ground capacity
  const tipStepNo = (!isPHC && r.rockCalcDetails) ? 6 : 2;
  html += `<div class="report-step"><span class="step-num">${tipStepNo}</span><strong>지반 허용연직지지력</strong>
  <div style="margin-top:8px;font-size:11px;color:var(--text-secondary)">기준: Meyerhof 공식 (사질토), KDS 11 50 40</div>
  <div style="margin-top:6px">$$Q_u = ${r.rockCalcDetails?'P_u':STATE.coeff_tip+' \\cdot N_{tip} \\cdot A_p'} + \\sum ${STATE.coeff_sand} N_s A_s + \\sum ${STATE.coeff_clay} N_c A_c$$</div>`;

  // Tip
  if (!r.rockCalcDetails) {
    const tipN = r.N_tip;
    html += `<div style="margin-top:8px;padding:8px;background:#f8f9fa;border-radius:4px">
    <div style="font-size:11px;font-weight:600;color:var(--primary-navy)">▸ 선단지지력</div>
    <div style="font-size:11px">$N_{tip} = \\min(N_{최하단},\\; 50) = \\min(${STATE.sptData.length>0?STATE.sptData[STATE.sptData.length-1].N:50},\\; 50) = ${tipN}$</div>
    <div style="font-size:11px">$A_p = \\frac{\\pi}{4} D^2 = \\frac{\\pi}{4} \\times ${fmt(r.D,4)}^2 = ${fmt(r.Ap_tip,4)}$ m²</div>
    <div style="font-size:11px;font-weight:700">$P_u = ${STATE.coeff_tip} \\times ${tipN} \\times ${fmt(r.Ap_tip,4)} = ${fmt(r.Qu_tip)}$ kN</div>
    </div>`;
  } else {
    html += `<div style="margin-top:6px;font-size:11px;font-weight:700">선단지지력: $P_u = ${fmt(r.rockCalcDetails.Pu_selected)}$ kN (${bearingMethodLabel(STATE.bearingMethod)}, 위에서 산정)</div>`;
  }

  // Skin friction table
  html += `<div style="margin-top:10px;padding:8px;background:#f8f9fa;border-radius:4px">
  <div style="font-size:11px;font-weight:600;color:var(--primary-navy);margin-bottom:4px">▸ 주면마찰력 상세</div>
  <div style="font-size:11px;margin-bottom:4px">둘레 $U = ${fmt(r.U,4)}$ m</div>
  <table style="margin-top:4px"><thead><tr><th>지층</th><th>분류</th><th>L(m)</th><th>N</th><th>As=U×L</th><th>사질토: ${STATE.coeff_sand}NAs</th><th>점성토: ${STATE.coeff_clay}NAc</th></tr></thead><tbody>`;
  r.processedLayers.forEach(l => {
    const elT = r.groundEL != null ? fmt(r.groundEL - l.depthFrom, 2) : '-';
    const elB = r.groundEL != null ? fmt(r.groundEL - l.depthTo, 2) : '-';
    html += `<tr${l.truncated ? ' style="background:#fff8e1"' : ''}>
    <td class="left">${l.soilType}</td>
    <td><span class="soil-badge ${l.soilClass}">${l.soilClass}</span></td>
    <td style="white-space:nowrap"><span style="font-size:10px;color:#495057">EL.${elT}~${elB}</span><br><strong>${fmt(l.thickness)}</strong>${l.truncated?'<span style="color:#c62828;font-size:9px">(절단)</span>':''}</td><td>${fmt(l.avgN,1)}</td>
    <td>$${fmt(r.U,4)} \\times ${fmt(l.thickness)} = ${fmt(l.As,3)}$</td>
    <td>${l.soilClass==='sand'?`$${STATE.coeff_sand} \\times ${fmt(Math.min(l.avgN,30),1)} \\times ${fmt(l.As,3)} = ${fmt(l.skinFriction_sand)}$`:'-'}</td>
    <td>${l.soilClass==='clay'?`$${STATE.coeff_clay} \\times ${fmt(Math.min(l.avgN,30),1)} \\times ${fmt(l.As,3)} = ${fmt(l.skinFriction_clay)}$`:'-'}</td>
    </tr>`;
  });
  html += `<tr style="background:#e8eaf6;font-weight:700"><td class="left" colspan="5">합계</td><td>${fmt(r.sum_2NsAs)}</td><td>${fmt(r.sum_625NcAc)}</td></tr>`;
  html += `</tbody></table></div>`;

  // Qu and Qa
  html += `<div style="margin-top:10px;padding:10px;background:#e8f5e9;border-radius:4px;border:1px solid #a5d6a7">
  <div style="font-size:11px;font-weight:700">$Q_u = ${fmt(r.Qu_tip)} + ${fmt(r.sum_2NsAs)} + ${fmt(r.sum_625NcAc)} = ${fmt(r.Qu)}$ kN</div>
  <div style="font-size:11px;font-weight:700;margin-top:4px">$Q_a = \\frac{Q_u}{FS} = \\frac{${fmt(r.Qu)}}{${r.FS}} = ${fmt(r.Qa_ground)}$ kN</div>
  </div>`;

  // Final selection
  const sumStepNo = tipStepNo + 1;
  html += `<div class="report-step" style="margin-top:10px;background:#e3f2fd"><span class="step-num">${sumStepNo}</span><strong>수직지지력 종합 비교</strong>
